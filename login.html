<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Akram Mostafa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a1f44;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(102,126,234,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(118,75,162,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(233,78,119,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            animation: floatOrb 8s ease-in-out infinite;
            pointer-events: none;
        }
        .orb-1 { width: 400px; height: 400px; background: #667eea; top: -100px; right: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: #e94e77; bottom: -80px; left: -80px; animation-delay: 3s; }
        .orb-3 { width: 250px; height: 250px; background: #f7931e; top: 40%; left: 30%; animation-delay: 5s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.05); }
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 25px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .back-btn:hover { color: #fff; transform: translateX(5px); }
        .back-btn i { font-size: 16px; }

        /* Login Card */
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 5;
        }

        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 48px 44px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 25px 60px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.08);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .login-logo .logo-icon i { font-size: 30px; color: #fff; }

        .login-logo h1 {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 6px;
        }

        .login-logo p {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        /* Form */
        .login-form h2 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 48px 14px 18px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
            direction: rtl;
        }

        .input-wrapper input::placeholder { color: rgba(255,255,255,0.25); font-weight: 400; }

        .input-wrapper input:focus {
            border-color: #667eea;
            background: rgba(102,126,234,0.08);
            box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
        }

        .input-wrapper input:focus + i,
        .input-wrapper:focus-within i { color: #667eea; }

        /* Toggle password */
        .toggle-password {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            font-size: 15px;
            padding: 4px;
            transition: color 0.3s;
        }
        .toggle-password:hover { color: rgba(255,255,255,0.7); }

        /* Error Message */
        .error-msg {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(233,78,119,0.12);
            border: 1px solid rgba(233,78,119,0.3);
            border-radius: 12px;
            padding: 12px 16px;
            color: #ff6b8a;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .error-msg.show { display: flex; }
        .error-msg i { font-size: 16px; flex-shrink: 0; }

        /* Success Message */
        .success-msg {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(37,211,102,0.12);
            border: 1px solid rgba(37,211,102,0.3);
            border-radius: 12px;
            padding: 12px 16px;
            color: #25D366;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .success-msg.show { display: flex; }

        /* Submit Button */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(102,126,234,0.55);
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .login-footer p {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            line-height: 1.7;
        }

        .login-footer a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
        }
        .login-footer a:hover { color: #c4b5fd; }

        /* Copyright */
        .login-copyright {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.2);
            font-size: 12px;
        }

        /* Mobile */
        @media (max-width: 480px) {
            .login-card { padding: 36px 28px; }
            .back-btn { right: 16px; top: 16px; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-right"></i>
        <span>العودة للرئيسية</span>
    </a>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="fas fa-play"></i>
                </div>
                <h1>AKRAM MOSTAFA</h1>
                <p>منصة التسويق والإعلانات الرقمية</p>
            </div>

            <div class="login-form">
                <h2><i class="fas fa-lock" style="color:#a78bfa;margin-left:8px;"></i> تسجيل الدخول</h2>

                <div class="error-msg" id="errorMsg">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">اسم المستخدم أو كلمة المرور غير صحيحة</span>
                </div>

                <div class="success-msg" id="successMsg">
                    <i class="fas fa-check-circle"></i>
                    <span>تم تسجيل الدخول بنجاح! جاري التحويل...</span>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="username"><i class="fas fa-user" style="margin-left:6px;opacity:0.7;"></i> اسم المستخدم</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم" autocomplete="username" required>
                            <i class="fas fa-user"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock" style="margin-left:6px;opacity:0.7;"></i> كلمة المرور</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
                            <i class="fas fa-lock"></i>
                            <button type="button" class="toggle-password" onclick="togglePassword()" id="toggleBtn">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <div class="spinner"></div>
                        <span class="btn-text"><i class="fas fa-sign-in-alt"></i> دخول</span>
                    </button>
                </form>
            </div>

            <div class="login-footer">
                <p>محتاج مساعدة؟ <a href="https://wa.me/00201555512778?text=محتاج%20مساعدة%20بخصوص%20تسجيل%20الدخول" target="_blank"><i class="fab fa-whatsapp"></i> تواصل</a></p>
            </div>
        </div>
        <p class="login-copyright">&copy; 2026 Akram Mostafa. جميع الحقوق محفوظة.</p>
    </div>

    <script>
        // =====================================================
        // بيانات العملاء - يمكن تعديل البيانات حسب الحاجة
        // =====================================================
        const CLIENTS = {
            // "اسم_المستخدم": { password: "كلمة_المرور", name: "الاسم الكامل", redirect: "الصفحة" }
            "akram":    { password: "Aazxc",     name: "Akram Mostafa",   redirect: "admin/index.html", isAdmin: true },
            "client1":  { password: "pass1234",  name: "العميل الأول",    redirect: "index.html" },
            "client2":  { password: "pass5678",  name: "العميل الثاني",   redirect: "index.html" },
            // يمكن إضافة المزيد هنا حسب الحاجة
        };
        // =====================================================

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            // Reset messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            // Loading state
            btn.classList.add('loading');
            btn.disabled = true;

            setTimeout(() => {
                // Check CLIENTS first (admin & registered clients take priority)
                const client = CLIENTS[username] || CLIENTS[username.toLowerCase()];

                if (client && client.password === password) {
                    // Success
                    successMsg.classList.add('show');
                    sessionStorage.setItem('akram_logged_in', 'true');
                    sessionStorage.setItem('akram_client_name', client.name);
                    sessionStorage.setItem('akram_username', username);
                    if (client.isAdmin) {
                        sessionStorage.setItem('am_admin_auth', '1');
                    }
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    setTimeout(() => {
                        window.location.href = client.redirect || 'index.html';
                    }, 1200);
                } else {
                    // Check localStorage users (employees / students)
                    try {
                        const lsUsers = JSON.parse(localStorage.getItem('am_users') || '[]');
                        const lsUser = lsUsers.find(u => u.username === username && u.password === password);
                        if (lsUser) {
                            successMsg.classList.add('show');
                            sessionStorage.setItem('akram_logged_in', 'true');
                            sessionStorage.setItem('akram_user_id', lsUser.id);
                            btn.classList.remove('loading');
                            btn.disabled = false;
                            setTimeout(() => { window.location.href = 'profile.html?id=' + lsUser.id; }, 1200);
                            return;
                        }
                    } catch(err) {}

                    // Error
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    errorMsg.classList.add('show');

                    // Shake animation
                    const card = document.querySelector('.login-card');
                    card.style.animation = 'none';
                    card.style.transform = 'translateX(8px)';
                    setTimeout(() => { card.style.transform = 'translateX(-8px)'; }, 80);
                    setTimeout(() => { card.style.transform = 'translateX(5px)'; }, 160);
                    setTimeout(() => { card.style.transform = 'translateX(0)'; }, 240);
                }
            }, 800);
        }

        function togglePassword() {
            const input   = document.getElementById('password');
            const icon    = document.getElementById('eyeIcon');
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            icon.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
        }

        // Clear error on typing
        document.getElementById('username').addEventListener('input', () => {
            document.getElementById('errorMsg').classList.remove('show');
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('errorMsg').classList.remove('show');
        });
    </script>
</body>
</html>
