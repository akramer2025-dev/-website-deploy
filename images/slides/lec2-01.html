<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}.card{text-align:center;padding:60px 40px;max-width:700px}.icon{font-size:80px;margin-bottom:20px;filter:drop-shadow(0 0 20px rgba(0,229,255,.5))}.title{font-size:36px;font-weight:900;margin-bottom:16px;background:linear-gradient(45deg,#00E5FF,#00B8D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.subtitle{font-size:20px;color:rgba(255,255,255,.85);line-height:1.8;margin-bottom:30px}.badge{display:inline-block;background:linear-gradient(45deg,#00E5FF,#00B8D4);padding:10px 30px;border-radius:50px;font-size:16px;font-weight:700;color:#0f0c29}</style></head><body><div class="card"><div class="icon">🚀</div><div class="title">الحصة الثانية</div><div class="subtitle">استراتيجية المحتوى وخطة النشر الشهرية</div><div class="badge">كورس التسويق الاحترافي – أبريل 2026</div></div></body></html>
