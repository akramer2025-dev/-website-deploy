<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#0d1117,#161b22,#1a2332);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{text-align:center;padding:50px 40px;max-width:700px}.icon{font-size:72px;margin-bottom:20px}.title{font-size:30px;font-weight:900;margin-bottom:14px;color:#34A853}.steps{text-align:right;margin-top:25px;display:flex;flex-direction:column;gap:14px}.step{display:flex;align-items:center;gap:14px;background:rgba(52,168,83,.08);border:1px solid rgba(52,168,83,.25);padding:14px 20px;border-radius:14px;font-size:16px;line-height:1.6}.num{background:#34A853;color:#fff;min-width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px}</style></head><body><div class="card"><div class="icon">📧</div><div class="title">خطوات إنشاء حساب جوجل جديد</div><div class="steps"><div class="step"><div class="num">1</div>افتح accounts.google.com واختر "إنشاء حساب"</div><div class="step"><div class="num">2</div>اختر "للاستخدام التجاري" أو "لنفسي"</div><div class="step"><div class="num">3</div>أدخل الاسم الأول واسم العائلة (يفضل اسم النشاط)</div><div class="step"><div class="num">4</div>اختر اسم مستخدم احترافي (البريد الإلكتروني)</div><div class="step"><div class="num">5</div>أنشئ كلمة مرور قوية وأكد رقم الهاتف</div></div></div></body></html>
