<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{text-align:center;padding:50px 40px;max-width:700px}.icon{font-size:72px;margin-bottom:20px}.title{font-size:30px;font-weight:900;margin-bottom:14px;background:linear-gradient(45deg,#4285F4,#34A853,#FBBC04,#EA4335);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sub{font-size:17px;color:rgba(255,255,255,.8);line-height:1.8;margin-bottom:20px}.tasks{text-align:right;display:flex;flex-direction:column;gap:10px;margin-top:20px}.task{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);padding:12px 18px;border-radius:12px;font-size:15px;line-height:1.6}.check{font-size:20px}</style></head><body><div class="card"><div class="icon">🎓</div><div class="title">ملخص الحصة والخطوات العملية</div><div class="sub">طبق الخطوات دي النهارده وابدأ ظهورك على جوجل!</div><div class="tasks"><div class="task"><div class="check">✅</div>أنشئ حساب جوجل باسم نشاطك التجاري</div><div class="task"><div class="check">✅</div>فعّل التحقق بخطوتين لتأمين حسابك</div><div class="task"><div class="check">✅</div>سجل نشاطك على business.google.com</div><div class="task"><div class="check">✅</div>أكمل كل بيانات الملف التجاري</div><div class="task"><div class="check">✅</div>أضف صور احترافية ومواعيد العمل</div><div class="task"><div class="check">✅</div>اطلب من عملائك تقييمات على الخرائط</div></div></div></body></html>
