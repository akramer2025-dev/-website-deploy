<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#0c0c1d,#1a1a3e,#2d2d5e);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{text-align:center;padding:50px 35px;max-width:720px}.icon{font-size:72px;margin-bottom:20px}.title{font-size:28px;font-weight:900;margin-bottom:20px;color:#a78bfa}.kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}.kpi{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.25);padding:16px 12px;border-radius:14px}.kpi-icon{font-size:28px;margin-bottom:6px}.kpi-name{font-size:13px;font-weight:700;color:#a78bfa}.kpi-val{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}.steps{display:flex;gap:6px;justify-content:center;margin-top:10px}.step{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600}</style></head><body><div class="card"><div class="icon">📈</div><div class="title">تحليل الأداء – Insights</div><div class="kpis"><div class="kpi"><div class="kpi-icon">👁️</div><div class="kpi-name">الوصول</div><div class="kpi-val">+5-10% أسبوعياً</div></div><div class="kpi"><div class="kpi-icon">❤️</div><div class="kpi-name">التفاعل</div><div class="kpi-val">3-6% فيسبوك</div></div><div class="kpi"><div class="kpi-icon">📈</div><div class="kpi-name">النمو</div><div class="kpi-val">1-5% شهرياً</div></div><div class="kpi"><div class="kpi-icon">🖱️</div><div class="kpi-name">النقرات</div><div class="kpi-val">CTA واضح</div></div><div class="kpi"><div class="kpi-icon">💰</div><div class="kpi-name">التكلفة</div><div class="kpi-val">3-10 ج/رسالة</div></div><div class="kpi"><div class="kpi-icon">🎯</div><div class="kpi-name">التحويل</div><div class="kpi-val">2-5% متاجر</div></div></div><div class="steps"><div class="step">🔵 مراجعة</div><div class="step">🟢 مقارنة</div><div class="step">🟡 أنماط</div><div class="step">🔴 تحسين</div><div class="step">🟣 توثيق</div></div></div></body></html>
