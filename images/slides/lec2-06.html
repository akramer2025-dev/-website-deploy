<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b,#334155);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{text-align:center;padding:50px 35px;max-width:720px}.icon{font-size:72px;margin-bottom:20px}.title{font-size:28px;font-weight:900;margin-bottom:20px;color:#38bdf8}.struct{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:20px}.level{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);padding:14px 30px;border-radius:14px;font-size:15px;font-weight:700;width:80%}.arrow{font-size:24px;color:rgba(56,189,248,.5)}.goals{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:right}.goal{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5}</style></head><body><div class="card"><div class="icon">💰</div><div class="title">أساسيات الإعلانات المدفوعة</div><div class="struct"><div class="level">🏢 الحملة – Campaign (الهدف)</div><div class="arrow">↓</div><div class="level">📂 المجموعة – Ad Set (الجمهور + الميزانية)</div><div class="arrow">↓</div><div class="level">📄 الإعلان – Ad (الصورة + النص)</div></div><div class="goals"><div class="goal">👁️ الوعي<br><small>5-10$/يوم</small></div><div class="goal">🔗 الزيارات<br><small>5-15$/يوم</small></div><div class="goal">💬 الرسائل<br><small>5-10$/يوم ⭐</small></div><div class="goal">🛍️ المبيعات<br><small>10-30$/يوم</small></div></div></div></body></html>
