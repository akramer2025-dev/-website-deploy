<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#1b1b2f,#162447,#1f4068);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{text-align:center;padding:50px 35px;max-width:720px}.icon{font-size:72px;margin-bottom:20px}.title{font-size:28px;font-weight:900;margin-bottom:20px;color:#fbbf24}.cols{display:flex;gap:20px;text-align:right}.col{flex:1;background:rgba(255,255,255,.05);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,.1)}.col-title{font-size:16px;font-weight:800;margin-bottom:12px;text-align:center}.rule{display:flex;align-items:center;gap:12px;margin-top:20px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);padding:14px 18px;border-radius:14px;font-size:15px;font-weight:700;justify-content:center}.time{font-size:13px;color:rgba(255,255,255,.7);margin-top:6px;line-height:1.6}</style></head><body><div class="card"><div class="icon">⏰</div><div class="title">أفضل أوقات النشر وقاعدة 80/20</div><div class="cols"><div class="col"><div class="col-title">📘 فيسبوك</div><div class="time">صباحاً: 8-10<br>ظهراً: 12-2<br>مساءً: 7-9 ⭐</div></div><div class="col"><div class="col-title">📸 انستجرام</div><div class="time">صباحاً: 7-9 ⭐<br>ظهراً: 11-1<br>مساءً: 5-7 ⭐</div></div><div class="col"><div class="col-title">🎵 تيك توك</div><div class="time">صباحاً: 7-9<br>ظهراً: 12-3 ⭐<br>ليلاً: 7-11 ⭐⭐</div></div></div><div class="rule">🟢 80% قيمة مجانية + 🔴 20% بيع = المعادلة الذهبية</div></div></body></html>
