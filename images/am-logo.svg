<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!-- Background Circle -->
  <circle cx="300" cy="300" r="280" fill="#f5f5f5"/>
  
  <!-- Gears (Left - Orange) -->
  <g transform="translate(180, 150)">
    <!-- Large Gear -->
    <circle cx="50" cy="60" r="45" fill="#E67E22"/>
    <circle cx="50" cy="60" r="25" fill="white" stroke="#E67E22" stroke-width="3"/>
    <path d="M 50 15 L 50 25 M 50 95 L 50 105 M 15 60 L 25 60 M 75 60 L 85 60" stroke="#E67E22" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Medium Gear -->
    <circle cx="100" cy="40" r="25" fill="#F39C12"/>
    <circle cx="100" cy="40" r="12" fill="white" stroke="#F39C12" stroke-width="2"/>
    
    <!-- Small Gear -->
    <circle cx="30" cy="25" r="18" fill="#F39C12"/>
    <circle cx="30" cy="25" r="8" fill="white" stroke="#F39C12" stroke-width="2"/>
    
    <!-- Larger Bottom Gear -->
    <circle cx="20" cy="130" r="40" fill="#E67E22"/>
    <circle cx="20" cy="130" r="22" fill="white" stroke="#E67E22" stroke-width="3"/>
    <circle cx="20" cy="95" r="8" fill="#E67E22"/>
    <circle cx="20" cy="165" r="8" fill="#E67E22"/>
    <circle cx="-15" cy="130" r="8" fill="#E67E22"/>
    <circle cx="55" cy="130" r="8" fill="#E67E22"/>
  </g>
  
  <!-- Head Profile (Right - Blue) -->
  <g transform="translate(380, 140)">
    <path d="M 100 80 Q 120 60 120 100 Q 120 200 90 260 L 70 260 Q 40 200 40 100 Q 40 60 60 80 Q 60 100 80 100 Q 100 100 100 80" 
          fill="#2C3E50" opacity="0.9"/>
    <ellipse cx="80" cy="200" rx="40" ry="60" fill="#2980B9" opacity="0.8"/>
    
    <!-- Neural Network inside head -->
    <g transform="translate(50, 120)">
      <!-- Dots -->
      <circle cx="10" cy="20" r="4" fill="#F39C12"/>
      <circle cx="30" cy="10" r="4" fill="#F39C12"/>
      <circle cx="30" cy="30" r="4" fill="#F39C12"/>
      <circle cx="30" cy="50" r="4" fill="#F39C12"/>
      <circle cx="50" cy="15" r="4" fill="#F39C12"/>
      <circle cx="50" cy="35" r="4" fill="#F39C12"/>
      <circle cx="50" cy="55" r="4" fill="#F39C12"/>
      <circle cx="70" cy="30" r="4" fill="#F39C12"/>
      
      <!-- Lines -->
      <line x1="10" y1="20" x2="30" y2="10" stroke="#F39C12" stroke-width="1.5" opacity="0.6"/>
      <line x1="10" y1="20" x2="30" y2="30" stroke="#F39C12" stroke-width="1.5" opacity="0.6"/>
      <line x1="30" y1="10" x2="50" y2="15" stroke="#F39C12" stroke-width="1.5" opacity="0.6"/>
      <line x1="30" y1="30" x2="50" y2="35" stroke="#F39C12" stroke-width="1.5" opacity="0.6"/>
      <line x1="30" y1="50" x2="50" y2="55" stroke="#F39C12" stroke-width="1.5" opacity="0.6"/>
      <line x1="50" y1="15" x2="70" y2="30" stroke="#F39C12" stroke-width="1.5" opacity="0.6"/>
      <line x1="50" y1="35" x2="70" y2="30" stroke="#F39C12" stroke-width="1.5" opacity="0.6"/>
      <line x1="50" y1="55" x2="70" y2="30" stroke="#F39C12" stroke-width="1.5" opacity="0.6"/>
    </g>
  </g>
  
  <!-- AM Letters (Center) -->
  <g transform="translate(200, 260)">
    <!-- Letter A (Orange) -->
    <path d="M 20 120 L 60 20 L 100 120 M 40 80 L 80 80" 
          fill="none" stroke="#E67E22" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Letter M (Blue) -->
    <path d="M 110 120 L 110 20 L 160 80 L 210 20 L 210 120" 
          fill="none" stroke="#2980B9" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- White outline for depth -->
    <path d="M 20 120 L 60 20 L 100 120 M 40 80 L 80 80" 
          fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
    <path d="M 110 120 L 110 20 L 160 80 L 210 20 L 210 120" 
          fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  </g>
</svg>
