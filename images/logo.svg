<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" class="am-logo-svg">
  <defs>
    <linearGradient id="lGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hexagon background -->
  <polygon points="60,6 108,33 108,87 60,114 12,87 12,33" fill="url(#bgGrad)"/>

  <!-- Hexagon border glow -->
  <polygon points="60,6 108,33 108,87 60,114 12,87 12,33" stroke="url(#lGrad)" stroke-width="2.2" opacity="0.85"/>

  <!-- Inner hex accent (thin) -->
  <polygon points="60,14 100,38 100,82 60,106 20,82 20,38" stroke="url(#lGrad)" stroke-width="0.7" opacity="0.25"/>

  <!-- Letter A (main shape) -->
  <path d="M35,84 L60,28 L85,84" stroke="url(#lGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <line x1="45" y1="66" x2="75" y2="66" stroke="url(#lGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Play triangle embedded in A -->
  <polygon points="54,42 67,51 54,60" fill="white" opacity="0.92"/>

  <!-- Corner dots -->
  <circle cx="24" cy="48" r="2.2" fill="#00E5FF" opacity="0.6"/>
  <circle cx="96" cy="72" r="2.2" fill="#00B8D4" opacity="0.6"/>
  <circle cx="60" cy="10" r="1.8" fill="#00E5FF" opacity="0.5"/>
</svg>
