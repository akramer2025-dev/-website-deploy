<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء موظف جديد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo','Segoe UI',Tahoma,sans-serif;background:#1e1b4b;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
        .box{background:#fff;color:#333;padding:40px;border-radius:16px;max-width:550px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
        h2{margin-bottom:8px;color:#667eea;font-size:22px;font-weight:800}
        .subtitle{color:#64748b;font-size:14px;margin-bottom:24px}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;margin-bottom:6px;font-weight:700;color:#374151;font-size:14px}
        .form-group input{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;font-family:inherit;transition:.25s;background:#fafbfc}
        .form-group input:focus{outline:none;border-color:#667eea;background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,.12)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:14px 36px;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;font-family:inherit;transition:.3s}
        .btn:hover{box-shadow:0 6px 20px rgba(102,126,234,.4);transform:translateY(-2px)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
        .result{background:#f0fdf4;border:2px solid #10b981;padding:20px;border-radius:12px;margin-top:20px;display:none;text-align:right;direction:rtl}
        .result.show{display:block}
        .result p{margin-bottom:8px;font-size:14px;line-height:1.8}
        .result a{color:#667eea;font-weight:bold;word-break:break-all;font-size:13px}
        .result .link-box{background:#eff6ff;border:1px solid #bfdbfe;padding:14px;border-radius:10px;margin-top:12px}
        .btn-copy{background:#10b981;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;transition:.2s}
        .btn-copy:hover{background:#059669}
        .error{color:#ef4444;margin-top:12px;display:none;font-size:14px;font-weight:600}
        .error.show{display:block}
        .spinner{display:none;margin:16px auto;text-align:center;color:#667eea;font-weight:600}
        .spinner.show{display:block}
    </style>
</head>
<body>
    <div class="box">
        <h2>➕ إضافة موظف جديد</h2>
        <p class="subtitle">سيتم إضافة الموظف في النظام مباشرة وإنشاء رابط التسجيل</p>
        
        <div class="form-group">
            <label>👤 اسم الموظف</label>
            <input type="text" id="empName" value="اسراء حامد" placeholder="أدخل اسم الموظف">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>📧 البريد الإلكتروني</label>
                <input type="email" id="empEmail" value="esraa@akrammostafa.com" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>📱 رقم الهاتف</label>
                <input type="tel" id="empPhone" value="01000000000" placeholder="01xxxxxxxxx">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>🔐 اسم المستخدم</label>
                <input type="text" id="empUsername" value="esraa" placeholder="اسم المستخدم للدخول">
            </div>
            <div class="form-group">
                <label>🔑 كلمة المرور</label>
                <input type="text" id="empPassword" value="Aa123456" placeholder="كلمة المرور">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>💼 المسمى الوظيفي</label>
                <input type="text" id="empJobTitle" value="موظف مبيعات" placeholder="مثال: موظف مبيعات">
            </div>
            <div class="form-group">
                <label>💰 الراتب (جنيه)</label>
                <input type="number" id="empSalary" value="5000" placeholder="الراتب الشهري">
            </div>
        </div>
        
        <button class="btn" id="createBtn" onclick="createEmployee()">✅ إضافة الموظف</button>
        
        <div class="spinner" id="spinner">⏳ جاري الإنشاء...</div>
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <p><strong>✅ تم إضافة الموظف بنجاح في النظام!</strong></p>
            <p>👤 الاسم: <strong id="resName"></strong></p>
            <p>🔐 اسم المستخدم: <strong id="resUsername"></strong></p>
            <p>🔑 كلمة المرور: <strong id="resPassword"></strong></p>
            <div class="link-box">
                <p><strong>🔗 رابط صفحة إكمال البيانات:</strong></p>
                <p><a id="empLink" href="#" target="_blank" id="linkText"></a></p>
                <button class="btn-copy" onclick="copyLink()">📋 نسخ الرابط</button>
            </div>
            <p style="font-size:12px;color:#64748b;margin-top:12px">📌 أرسل هذا الرابط للموظف — لما يفتحه هيدخل علطول على صفحة إكمال البيانات</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyB9rVI5Fn96Mhm6x6aVcKrf8_epQ_c9H4s",
            authDomain: "akramplatform-2c6be.firebaseapp.com",
            projectId: "akramplatform-2c6be",
            storageBucket: "akramplatform-2c6be.firebasestorage.app",
            messagingSenderId: "132959399686",
            appId: "1:132959399686:web:7f1db74b25bebe27a8f887"
        });
        var db = firebase.firestore();
        var generatedLink = '';

        async function createEmployee(){
            var btn = document.getElementById('createBtn');
            var spinner = document.getElementById('spinner');
            var errorEl = document.getElementById('error');
            var resultEl = document.getElementById('result');
            
            var name = document.getElementById('empName').value.trim();
            var email = document.getElementById('empEmail').value.trim();
            var phone = document.getElementById('empPhone').value.trim();
            var username = document.getElementById('empUsername').value.trim();
            var password = document.getElementById('empPassword').value.trim();
            var jobTitle = document.getElementById('empJobTitle').value.trim();
            var salary = document.getElementById('empSalary').value.trim();
            
            if(!name || !username || !password){
                errorEl.textContent = '❌ الاسم واسم المستخدم وكلمة المرور مطلوبين';
                errorEl.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            spinner.classList.add('show');
            errorEl.classList.remove('show');
            resultEl.classList.remove('show');
            
            try {
                var empId = 'emp_' + Date.now();
                
                // 1) Add to employees collection (for onboarding page)
                await db.collection('employees').doc(empId).set({
                    name: name,
                    full_name: name,
                    email: email,
                    phone: phone,
                    job_title: jobTitle,
                    jobTitle: jobTitle,
                    salary: parseFloat(salary) || 0,
                    status: 'pending',
                    applicationStatus: 'waiting',
                    onboardingCompleted: false,
                    createdAt: new Date().toISOString()
                });
                
                // 2) Add to admin_data/users (for admin system)
                var usersDoc = await db.collection('admin_data').doc('users').get();
                var usersArr = [];
                if(usersDoc.exists && usersDoc.data().data){
                    usersArr = usersDoc.data().data;
                }
                
                usersArr.push({
                    id: empId,
                    name: name,
                    username: username,
                    password: password,
                    email: email,
                    phone: phone,
                    type: 'employee',
                    role: jobTitle,
                    department: '',
                    courses: '',
                    level: 'مبتدئ',
                    avatar: '',
                    bio: '',
                    createdAt: new Date().toISOString()
                });
                
                await db.collection('admin_data').doc('users').set({
                    data: usersArr,
                    updatedAt: Date.now()
                });
                
                // Show result
                var baseUrl = window.location.origin;
                generatedLink = baseUrl + '/employee-onboarding.html?id=' + empId;
                
                document.getElementById('resName').textContent = name;
                document.getElementById('resUsername').textContent = username;
                document.getElementById('resPassword').textContent = password;
                document.getElementById('empLink').href = generatedLink;
                document.getElementById('empLink').textContent = generatedLink;
                
                resultEl.classList.add('show');
                spinner.classList.remove('show');
                
            } catch(err){
                spinner.classList.remove('show');
                errorEl.textContent = '❌ خطأ: ' + err.message;
                errorEl.classList.add('show');
                btn.disabled = false;
            }
        }
        
        function copyLink(){
            if(generatedLink){
                navigator.clipboard.writeText(generatedLink).then(function(){
                    var btn = document.querySelector('.btn-copy');
                    btn.textContent = '✅ تم النسخ!';
                    setTimeout(function(){ btn.textContent = '📋 نسخ الرابط'; }, 2000);
                });
            }
        }
    </script>
</body>
</html>
