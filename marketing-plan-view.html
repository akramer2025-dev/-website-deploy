  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      padding: 40px 20px;
      line-height: 1.8;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(233, 78, 119, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(247, 147, 30, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 
        0 25px 70px rgba(0, 0, 0, 0.4),
        0 0 1px rgba(255, 255, 255, 0.2) inset;
      overflow: hidden;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      z-index: 1;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }

    .header {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
      padding: 80px 50px;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, transparent 60%);
      animation: pulse 4s ease-in-out infinite;
    }

    .header::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
      background-size: 200% 200%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { 
        transform: scale(1) rotate(0deg); 
        opacity: 0.3; 
      }
      50% { 
        transform: scale(1.15) rotate(180deg); 
        opacity: 0.6; 
      }
    }

    .header-content {
      position: relative;
      z-index: 2;
    }

    .logo-container {
      margin-bottom: 25px;
      animation: fadeInDown 0.8s ease;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      box-shadow: 
        0 15px 35px rgba(0, 0, 0, 0.3),
        0 0 0 4px rgba(255, 255, 255, 0.95),
        0 0 0 8px rgba(255, 255, 255, 0.5);
      position: relative;
      overflow: visible;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.1));
    }

    .logo::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg);
      animation: logoShine 3s ease-in-out infinite;
    }

    @keyframes logoShine {
      0%, 100% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      50% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header h1 {
      font-size: 3rem;
      margin-bottom: 15px;
      font-weight: 900;
      animation: fadeInDown 0.9s ease;
      text-shadow: 
        2px 2px 20px rgba(0, 0, 0, 0.3),
        0 0 40px rgba(255, 255, 255, 0.2);
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 1.3rem;
      opacity: 0.95;
      animation: fadeInDown 1s ease;
      font-weight: 600;
      text-shadow: 1px 1px 10px rgba(0, 0, 0, 0.2);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .content {
      padding: 60px 50px;
    }

    .company-info {
      background: linear-gradient(135deg, rgba(30,60,114,0.08) 0%, rgba(126,34,206,0.08) 100%);
      padding: 40px;
      border-radius: 20px;
      margin-bottom: 50px;
      border: 2px solid rgba(126,34,206,0.15);
      box-shadow: 0 8px 30px rgba(126,34,206,0.1);
      position: relative;
      overflow: hidden;
    }

    .company-info::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #1e3c72, #7e22ce, #1e3c72);
      border-radius: 20px;
      z-index: -1;
      opacity: 0.3;
      filter: blur(10px);
    }

    .company-info h2 {
      color: #1e3c72;
      font-size: 2rem;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 800;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 1.1rem;
      color: #333;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.7);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .info-item:hover {
      transform: translateX(-5px);
      background: rgba(126,34,206,0.08);
      box-shadow: 0 4px 15px rgba(126,34,206,0.15);
    }

    .info-item i {
      color: #7e22ce;
      font-size: 1.4rem;
      width: 35px;
      text-align: center;
      background: linear-gradient(135deg, rgba(126,34,206,0.15), rgba(30,60,114,0.1));
      padding: 10px;
      border-radius: 10px;
    }

    .section {
      margin-bottom: 50px;
      animation: fadeInUp 0.6s ease both;
    }

    .section:nth-child(2) { animation-delay: 0.1s; }
    .section:nth-child(3) { animation-delay: 0.2s; }
    .section:nth-child(4) { animation-delay: 0.3s; }

    .section-title {
      font-size: 2rem;
      color: #1e3c72;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 4px solid transparent;
      border-image: linear-gradient(90deg, #1e3c72, #7e22ce) 1;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 800;
    }

    .section-title i {
      color: #7e22ce;
      font-size: 1.8rem;
      background: linear-gradient(135deg, rgba(126,34,206,0.15), rgba(30,60,114,0.1));
      padding: 12px;
      border-radius: 12px;
    }

    .section-content {
      font-size: 1.1rem;
      color: #444;
      white-space: pre-line;
      line-height: 2;
      background: rgba(0,0,0,0.02);
      padding: 25px;
      border-radius: 15px;
      border-right: 4px solid #7e22ce;
    }

    .platforms {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 20px;
    }

    .platform-badge {
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .platform-badge::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s ease;
    }

    .platform-badge:hover::before {
      left: 100%;
    }

    .platform-badge:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .platform-badge.facebook {
      background: linear-gradient(135deg, #1877f2, #0a5ec4);
      color: white;
    }

    .platform-badge.instagram {
      background: linear-gradient(135deg, #e4405f, #c13584, #833ab4);
      color: white;
    }

    .platform-badge.tiktok {
      background: linear-gradient(135deg, #000, #222, #000);
      color: white;
    }

    .platform-badge.snapchat {
      background: linear-gradient(135deg, #fffc00, #f5eb3a);
      color: #333;
    }

    .platform-badge.twitter {
      background: linear-gradient(135deg, #1da1f2, #0c85d0);
      color: white;
    }

    .platform-badge.google {
      background: linear-gradient(135deg, #ea4335, #d62516, #c71610);
      color: white;
    }

    .platform-badge i {
      font-size: 1.2rem;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      margin-top: 25px;
    }

    .metric-card {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 30px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .metric-card:hover::before {
      opacity: 1;
    }

    .metric-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4);
    }

    .metric-card i {
      font-size: 3rem;
      margin-bottom: 15px;
      opacity: 0.95;
      position: relative;
      z-index: 1;
    }

    .metric-label {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 8px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .metric-value {
      font-size: 2.2rem;
      font-weight: 900;
      position: relative;
      z-index: 1;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
    }

    .footer {
      background: linear-gradient(135deg, #1e1e1e 0%, #111 100%);
      color: white;
      padding: 60px 50px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .footer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #1e3c72, #7e22ce, #1e3c72);
    }

    .footer h3 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .footer p {
      opacity: 0.85;
      margin-bottom: 25px;
      font-size: 1.1rem;
    }

    .contact-info {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-top: 25px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.05rem;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50px;
      transition: all 0.3s ease;
    }

    .contact-item:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .contact-item i {
      color: #f093fb;
      font-size: 1.2rem;
      width: 30px;
      text-align: center;
    }

    .btn-print {
      position: fixed;
      bottom: 35px;
      left: 35px;
      background: linear-gradient(135deg, #1e3c72, #7e22ce);
      color: white;
      padding: 18px 35px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(126, 34, 206, 0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      font-family: 'Cairo', sans-serif;
    }

    .btn-print:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 40px rgba(126, 34, 206, 0.6);
    }

    .btn-print:active {
      transform: translateY(-2px) scale(1.02);
    }

    .btn-print i {
      font-size: 1.3rem;
    }

    .btn-whatsapp {
      position: fixed;
      bottom: 35px;
      right: 35px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      padding: 18px 35px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(37, 211, 102, 0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      font-family: 'Cairo', sans-serif;
    }

    .btn-whatsapp:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 40px rgba(37, 211, 102, 0.6);
    }

    .btn-whatsapp:active {
      transform: translateY(-2px) scale(1.02);
    }

    .btn-whatsapp i {
      font-size: 1.3rem;
    }

    .loading {
      text-align: center;
      padding: 120px 20px;
      color: white;
      font-size: 1.6rem;
      font-weight: 600;
    }

    .loading i {
      font-size: 4.5rem;
      margin-bottom: 25px;
      animation: spin 2s linear infinite;
      color: #f093fb;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }
      body::before {
        display: none;
      }
      .btn-print {
        display: none;
      }
      .container {
        box-shadow: none;
        border-radius: 0;
      }
      .header {
        background: #1e3c72 !important;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 15px 8px;
      }
      
      body::before {
        background: 
          radial-gradient(circle at 20% 30%, rgba(233, 78, 119, 0.08) 0%, transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(247, 147, 30, 0.08) 0%, transparent 40%);
      }
      
      .container {
        border-radius: 16px;
      }
      
      .header {
        padding: 40px 20px;
      }
      
      .logo {
        width: 90px;

        margin-bottom: 15px;
      }
      
      .header h1 {
        font-size: 1.75rem;

      }

        font-size: 1rem;

      }

        padding: 30px 20px;
      }

        padding: 25px 20px;

      }
      
      .company-info h2 {
        font-size: 1.5rem;
        margin-bottom: 20px;
      }
      
      .info-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      
      .info-item {
        font-size: 0.95rem;
        padding: 10px;
      }
      
      .info-item i {
        font-size: 1.2rem;
        width: 30px;
        padding: 8px;
      }
      
      .section {
        margin-bottom: 35px;
      }
      
      .section-title {
        font-size: 1.5rem;
        margin-bottom: 18px;
        padding-bottom: 12px;
        gap: 10px;
      }
      
      .section-title i {
        font-size: 1.4rem;
        padding: 10px;
      }
      
      .section-content {
        font-size: 1rem;
        line-height: 1.8;

      }
      
      .platforms {
        gap: 10px;
      }
      
      .platform-badge {
        padding: 10px 18px;

      }
      
      .platform-badge i {
        font-size: 1rem;
      }

        grid-template-columns: 1fr;

      }
      
      .metric-card {
        padding: 20px;
      }
      
      .metric-card i {
        font-size: 2.2rem;
        margin-bottom: 12px;
      }
      
      .metric-label {
        font-size: 0.9rem;
      }
      
      .metric-value {
        font-size: 1.8rem;
      }
      
      .footer {
        padding: 40px 20px;
      }
      
      .footer h3 {
        font-size: 1.5rem;
        margin-bottom: 15px;
      }
      
      .footer p {
        font-size: 0.95rem;
        margin-bottom: 20px;
      }
      
      .contact-info {
        gap: 12px;
        flex-direction: column;
        align-items: stretch;
      }
      
      .contact-item {
        font-size: 0.95rem;

        justify-content: center;
      }
      
      .btn-print {
        bottom: 15px;
        left: 15px;
        padding: 12px 20px;
        font-size: 0.95rem;
        gap: 8px;
      }
      
      .btn-print i {
        font-size: 1.1rem;
      }
      
      .btn-whatsapp {
        bottom: 15px;
        right: 15px;
        padding: 12px 20px;
        font-size: 0.95rem;
        gap: 8px;
      }
      
      .btn-whatsapp i {
        font-size: 1.1rem;
      }
      
      .loading {
        padding: 80px 20px;
        font-size: 1.3rem;
      }
      
      .loading i {
        font-size: 3.5rem;
        margin-bottom: 20px;
      }
    }
    
    @media (max-width: 480px) {
      body {
        padding: 10px 5px;
      }
      
      .header {
        padding: 30px 15px;
      }
      
      .logo {
        width: 75px;
        height: 75px;
      }
      
      .header h1 {
        font-size: 1.4rem;
      }
      
      .header p {
        font-size: 0.9rem;
      }
      
      .content {
        padding: 25px 15px;
      }
      
      .company-info h2,
      .section-title {
        font-size: 1.3rem;
      }
      
      .section-content {
        font-size: 0.95rem;
        padding: 15px 12px;
      }
      
      .platform-badge {
        padding: 8px 14px;
        font-size: 0.85rem;
      }
      
      .metric-value {
        font-size: 1.5rem;
      }
      
      .btn-print {
        bottom: 10px;
        left: 10px;
        padding: 10px 16px;
        font-size: 0.85rem;
      }
      
      .btn-whatsapp {
        bottom: 10px;
        right: 10px;
        padding: 10px 16px;
        font-size: 0.85rem;
      }
    }
  </style>

<body>
  <div class="loading" id="loading">
    <i class="fas fa-spinner"></i>
    <p>جاري تحميل الخطة التسويقية...</p>
  </div>

  <div class="container" id="planContainer" style="display:none;">
    <!-- Content will be loaded here -->
  </div>

  <button class="btn-print" onclick="window.print()" id="printBtn" style="display:none;">
    <i class="fas fa-print"></i>
    <span>طباعة / حفظ PDF</span>
  </button>

  <button class="btn-whatsapp" onclick="shareToWhatsApp()" id="whatsappBtn" style="display:none;">
    <i class="fab fa-whatsapp"></i>
    <span>إرسال للواتساب</span>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

    async function loadPlan() {
      const urlParams = new URLSearchParams(window.location.search);
      const planId = urlParams.get('id');

      if (!planId) {
        document.getElementById('loading').innerHTML = `
          <i class="fas fa-exclamation-triangle"></i>
          <p>معرف الخطة غير موجود!</p>
        `;
        return;
      }

      try {
        const { data: plan, error } = await _supabase
          .from('marketing_plans')
          .select('*')
          .eq('id', planId)
          .single();

        if (error) throw error;

        if (!plan) {
          document.getElementById('loading').innerHTML = `
            <i class="fas fa-exclamation-triangle"></i>
            <p>الخطة غير موجودة!</p>
          `;
          return;
        }

        renderPlan(plan);

      } catch (err) {
        console.error('Error loading plan:', err);
        document.getElementById('loading').innerHTML = `
          <i class="fas fa-exclamation-triangle"></i>
          <p>حدث خطأ أثناء تحميل الخطة</p>
        `;
      }
    }

    function renderPlan(plan) {
      const planData = typeof plan.plan_data === 'string' ? JSON.parse(plan.plan_data) : plan.plan_data;
      const industries = {
        ecommerce: 'تجارة إلكترونية',
        restaurants: 'مطاعم ومقاهي',
        realestate: 'عقارات',
        education: 'تعليم',
        health: 'صحة وجمال',
        services: 'خدمات',
        fashion: 'أزياء وموضة',
        tech: 'تكنولوجيا',
        other: 'أخرى'
      };

      // Handle platforms - can be array or object
      let platformsData = planData.platforms || [];
      
      // If platforms is an object (new format: {ig: 'url', fb: 'url', ...}), convert to array
      if (!Array.isArray(platformsData) && typeof platformsData === 'object') {
        platformsData = [];
        const links = planData.platforms;
        if (links.ig) platformsData.push('instagram');
        if (links.fb) platformsData.push('facebook');
        if (links.tt) platformsData.push('tiktok');
        if (links.yt) platformsData.push('youtube');
        if (links.tw) platformsData.push('twitter');
        if (links.li) platformsData.push('linkedin');
        if (links.web) platformsData.push('website');
      }
      
      const platformsHTML = platformsData.map(p => {
        const platformData = {
          facebook: { name: 'Facebook', icon: 'fab fa-facebook', class: 'facebook' },
          instagram: { name: 'Instagram', icon: 'fab fa-instagram', class: 'instagram' },
          tiktok: { name: 'TikTok', icon: 'fab fa-tiktok', class: 'tiktok' },
          youtube: { name: 'YouTube', icon: 'fab fa-youtube', class: 'youtube' },
          snapchat: { name: 'Snapchat', icon: 'fab fa-snapchat', class: 'snapchat' },
          twitter: { name: 'Twitter / X', icon: 'fab fa-x-twitter', class: 'twitter' },
          linkedin: { name: 'LinkedIn', icon: 'fab fa-linkedin', class: 'linkedin' },
          website: { name: 'Website', icon: 'fas fa-globe', class: 'website' },
          google: { name: 'Google Ads', icon: 'fab fa-google', class: 'google' }
        };
        const pd = platformData[p];
        if (!pd) return '';
        return `<div class="platform-badge ${pd.class}"><i class="${pd.icon}"></i> ${pd.name}</div>`;
      }).join('');

      const html = `
        <div class="header">
          <div class="header-content">
            <div class="logo-container">
              <div class="logo">
                <img src="images/1772173627537.png" alt="أكرم مصطفى">
              </div>
            </div>
            <h1>خطة تسويقية احترافية</h1>
            <p>مُعدَّة بواسطة أكرم مصطفى - خبير التسويق الرقمي</p>
          </div>
        </div>

        <div class="content">
          <!-- Company Info -->
          <div class="company-info">
            <h2><i class="fas fa-building"></i> معلومات الشركة</h2>
            <div class="info-grid">
              <div class="info-item">
                <i class="fas fa-building"></i>
                <span><strong>اسم الشركة:</strong> ${plan.company_name}</span>
              </div>
              <div class="info-item">
                <i class="fas fa-industry"></i>
                <span><strong>المجال:</strong> ${industries[plan.company_industry] || plan.company_industry}</span>
              </div>
              <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span><strong>البريد:</strong> ${plan.company_email}</span>
              </div>
              ${plan.company_phone ? `
                <div class="info-item">
                  <i class="fas fa-phone"></i>
                  <span><strong>الهاتف:</strong> ${plan.company_phone}</span>
                </div>
              ` : ''}
            </div>
          </div>

          <!-- Goal -->
          ${planData.goal ? `
            <div class="section">
              <h2 class="section-title"><i class="fas fa-bullseye"></i> الهدف التسويقي</h2>
              <div class="section-content">${planData.goal}</div>
            </div>
          ` : ''}

          <!-- Metrics -->
          ${planData.budget || planData.duration ? `
            <div class="section">
              <h2 class="section-title"><i class="fas fa-chart-bar"></i> المؤشرات الرئيسية</h2>
              <div class="metrics-grid">
                ${planData.budget ? `
                  <div class="metric-card">
                    <i class="fas fa-dollar-sign"></i>
                    <div class="metric-label">الميزانية الشهرية</div>
                    <div class="metric-value">${parseFloat(planData.budget).toLocaleString('ar-EG')} جنيه</div>
                  </div>
                ` : ''}
                ${planData.duration ? `
                  <div class="metric-card">
                    <i class="fas fa-calendar-alt"></i>
                    <div class="metric-label">المدة</div>
                    <div class="metric-value">${planData.duration} شهور</div>
                  </div>
                ` : ''}
              </div>
            </div>
          ` : ''}

          <!-- Platforms -->
          ${platforms.length > 0 ? `
            <div class="section">
              <h2 class="section-title"><i class="fas fa-share-alt"></i> المنصات المستهدفة</h2>
              <div class="platforms">
                ${platformsHTML}
              </div>
            </div>
          ` : ''}

          <!-- Strategy -->
          ${planData.strategy ? `
            <div class="section">
              <h2 class="section-title"><i class="fas fa-lightbulb"></i> الاستراتيجيات والتوصيات</h2>
              <div class="section-content">${planData.strategy}</div>
            </div>
          ` : ''}

          <!-- Metrics Tools -->
          ${planData.metrics ? `
            <div class="section">
              <h2 class="section-title"><i class="fas fa-tools"></i> الأدوات والمقاييس</h2>
              <div class="section-content">${planData.metrics}</div>
            </div>
          ` : ''}

          <!-- Notes -->
          ${planData.notes ? `
            <div class="section">
              <h2 class="section-title"><i class="fas fa-sticky-note"></i> ملاحظات إضافية</h2>
              <div class="section-content">${planData.notes}</div>
            </div>
          ` : ''}
        </div>

        <div class="footer">
          <h3>أكرم مصطفى - خبير التسويق الرقمي</h3>
          <p>متخصص في إدارة حملات السوشيال ميديا والإعلانات الممولة وصناعة المحتوى الإبداعي</p>
          <div class="contact-info">
            <div class="contact-item">
              <i class="fas fa-globe"></i>
              <span>www.akrammostafa.com</span>
            </div>
            <div class="contact-item">
              <i class="fas fa-envelope"></i>
              <span>info@akrammostafa.com</span>
            </div>
            <div class="contact-item">
              <i class="fab fa-whatsapp"></i>
              <span>تواصل واتساب</span>
            </div>
          </div>
        </div>
      `;

      document.getElementById('planContainer').innerHTML = html;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('planContainer').style.display = 'block';
      document.getElementById('printBtn').style.display = 'flex';
      document.getElementById('whatsappBtn').style.display = 'flex';
      
      // Update page title and meta tags
      document.title = `خطة تسويقية - ${plan.company_name}`;
      updateMetaTags(plan);
    }

    function updateMetaTags(plan) {
      // Update Open Graph meta tags dynamically
      const ogTitle = `خطة تسويقية احترافية لـ ${plan.company_name}`;
      const ogDescription = `خطة تسويقية متكاملة مُعدَّة خصيصاً لشركة ${plan.company_name} في مجال ${getIndustryLabel(plan.company_industry)}`;
      const ogUrl = window.location.href;
      
      document.querySelector('meta[property="og:title"]').setAttribute('content', ogTitle);
      document.querySelector('meta[property="og:description"]').setAttribute('content', ogDescription);
      document.querySelector('meta[property="og:url"]').setAttribute('content', ogUrl);
      
      document.querySelector('meta[name="twitter:title"]').setAttribute('content', ogTitle);
      document.querySelector('meta[name="twitter:description"]').setAttribute('content', ogDescription);
      document.querySelector('meta[name="twitter:url"]').setAttribute('content', ogUrl);
    }

    function getIndustryLabel(industry) {
      const industries = {
        ecommerce: 'التجارة الإلكترونية',
        restaurants: 'المطاعم والمقاهي',
        realestate: 'العقارات',
        education: 'التعليم',
        health: 'الصحة والجمال',
        services: 'الخدمات',
        fashion: 'الأزياء والموضة',
        tech: 'التكنولوجيا',
        other: 'أخرى'
      };
      return industries[industry] || industry;
    }

    function shareToWhatsApp() {
      const url = window.location.href;
      const urlParams = new URLSearchParams(window.location.search);
      const planId = urlParams.get('id');
      
      // Get plan company name from page title or use generic text
      const companyName = document.querySelector('.company-info .info-item span')?.textContent.replace('اسم الشركة: ', '') || 'خطة تسويقية';
      
      const message = `✨ *خطة تسويقية احترافية*\n\n` +
                     `🏢 ${companyName}\n\n` +
                     `📊 خطة تسويقية متكاملة مُعدَّة خصيصاً بواسطة:\n` +
                     `*أكرم مصطفى - خبير التسويق الرقمي*\n\n` +
                     `🔗 اطلع على الخطة الكاملة:\n${url}\n\n` +
                     `📞 للمزيد من المعلومات:\n` +
                     `🌐 www.akrammostafa.com`;
      
      const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
      window.open(whatsappUrl, '_blank');
    }

    // Load plan on page load
    loadPlan();
  </script>
</body>
</html>
