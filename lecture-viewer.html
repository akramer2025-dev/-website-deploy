<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عارض المحاضرة | Akram Mostafa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050d1b; --bg2:#09162b; --card:#0d1e38; --card2:#112446;
  --border:rgba(255,255,255,0.07); --pink:#e94e77; --orange:#f7931e;
  --grad:linear-gradient(135deg,#e94e77,#f7931e); --green:#22c55e;
  --blue:#3b82f6; --text:#e2eaf6; --muted:#6b82a8;
  --sidebar:260px; --topbar:58px; --bottom:80px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:'Cairo',sans-serif;}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;right:0;left:0;z-index:200;
  height:var(--topbar);background:rgba(5,13,27,.96);border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;
}
.tb-brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.tb-brand img{width:32px;height:32px;}
.tb-brand-info{line-height:1.3;}
.tb-brand-info .lec-title{font-size:.9rem;font-weight:800;color:#fff;max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-brand-info .crs-name{font-size:.72rem;color:var(--muted);font-weight:600;}
.tb-center{display:flex;align-items:center;gap:16px;flex:1;justify-content:center;}
.progress-wrap{flex:1;max-width:400px;}
.progress-track{height:4px;background:var(--card2);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--grad);border-radius:4px;transition:.4s ease;}
.progress-text{text-align:center;font-size:.72rem;color:var(--muted);margin-top:5px;}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tb-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:.2s;}
.tb-btn:hover{color:var(--text);background:rgba(255,255,255,.08);}
.tb-back{display:flex;align-items:center;gap:7px;padding:7px 14px;border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:9px;color:var(--muted);font-size:.8rem;font-weight:700;transition:.2s;}
.tb-back:hover{color:var(--text);}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:var(--topbar);right:0;bottom:0;width:var(--sidebar);
  background:var(--card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;transition:.3s;
}
.sidebar.collapsed{transform:translateX(100%);}
.sidebar-head{padding:16px;border-bottom:1px solid var(--border);font-size:.78rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;}
.sidebar-head .total{font-size:.8rem;color:var(--text);font-weight:700;background:var(--bg2);border-radius:20px;padding:3px 10px;}
.slides-list{flex:1;overflow-y:auto;padding:8px;}
.slides-list::-webkit-scrollbar{width:4px;} .slides-list::-webkit-scrollbar-track{background:transparent;} .slides-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.slide-thumb-item{border-radius:12px;overflow:hidden;margin-bottom:6px;border:2px solid transparent;cursor:pointer;transition:.2s;background:var(--bg2);display:flex;gap:0;flex-direction:column;}
.slide-thumb-item:hover{border-color:rgba(233,78,119,.3);}
.slide-thumb-item.active{border-color:var(--pink);box-shadow:0 0 0 2px rgba(233,78,119,.2);}
.slide-thumb-media{width:100%;aspect-ratio:16/9;background:var(--card2);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.slide-thumb-media img{width:100%;height:100%;object-fit:cover;}
.slide-thumb-media .type-ico{font-size:1.2rem;color:var(--muted);}
.slide-thumb-media .slide-num{position:absolute;top:5px;right:6px;width:20px;height:20px;background:rgba(0,0,0,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:#fff;}
.slide-thumb-footer{padding:8px 10px;}
.slide-thumb-footer .stt{font-size:.75rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slide-thumb-footer .stl{font-size:.68rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── MAIN STAGE ── */
.stage{
  position:fixed;top:var(--topbar);right:var(--sidebar);left:0;bottom:var(--bottom);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:radial-gradient(ellipse at 50% 40%, rgba(13,30,56,.9) 0%, var(--bg) 70%);
  transition:right .3s;
}
.stage.full{right:0;}
.slide-container{width:100%;height:100%;position:relative;display:flex;align-items:stretch;}

/* SLIDE */
.slide{
  position:absolute;inset:0;display:flex;align-items:stretch;
  opacity:0;pointer-events:none;
  transition:opacity .05s;
}
.slide.active{opacity:1;pointer-events:all;}
/* animation classes */
.slide.entering-next{animation:slideEnterNext .55s cubic-bezier(.4,0,.2,1) forwards;}
.slide.entering-prev{animation:slideEnterPrev .55s cubic-bezier(.4,0,.2,1) forwards;}
.slide.leaving-next{animation:slideLeaveNext .5s cubic-bezier(.4,0,.2,1) forwards;}
.slide.leaving-prev{animation:slideLeavePrev .5s cubic-bezier(.4,0,.2,1) forwards;}

@keyframes slideEnterNext{
  from{opacity:0;transform:translateX(-60px) scale(.96);}
  to{opacity:1;transform:none;}
}
@keyframes slideEnterPrev{
  from{opacity:0;transform:translateX(60px) scale(.96);}
  to{opacity:1;transform:none;}
}
@keyframes slideLeaveNext{
  from{opacity:1;transform:none;}
  to{opacity:0;transform:translateX(60px) scale(.96);}
}
@keyframes slideLeavePrev{
  from{opacity:1;transform:none;}
  to{opacity:0;transform:translateX(-60px) scale(.96);}
}

/* SLIDE LAYOUT: media + notes */
.slide-inner{flex:1;display:grid;grid-template-columns:1fr 340px;grid-template-rows:1fr;}
.slide-media-col{display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
.slide-media-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(30px) brightness(.3);transform:scale(1.1);}
.slide-media-wrap{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.slide-media-frame{position:relative;max-width:100%;max-height:100%;border-radius:16px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08);}
.slide-media-frame img{display:block;max-width:100%;max-height:calc(100vh - var(--topbar) - var(--bottom) - 80px);object-fit:contain;border-radius:16px;}
.slide-media-frame .video-wrap{width:100%;aspect-ratio:16/9;background:#000;border-radius:16px;overflow:hidden;}
.slide-media-frame .video-wrap video{width:100%;height:100%;}
.slide-media-frame .video-wrap iframe{width:100%;height:100%;border:none;}
.slide-media-frame .pdf-wrap{width:700px;max-width:100%;height:500px;background:#fff;border-radius:16px;overflow:hidden;}
.slide-media-frame .pdf-wrap iframe{width:100%;height:100%;border:none;}
.no-media-placeholder{width:100%;aspect-ratio:16/10;max-width:600px;background:var(--card2);border:2px dashed var(--border);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);}
.no-media-placeholder i{font-size:3rem;opacity:.4;}

/* slide TITLE on media */
.slide-media-title{font-size:1.05rem;font-weight:800;color:#fff;text-align:center;text-shadow:0 2px 12px rgba(0,0,0,.8);padding:0 12px;animation:fadeUp .5s .2s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* NOTES COL */
.slide-notes-col{
  padding:24px 20px 24px 24px;display:flex;flex-direction:column;gap:16px;
  background:rgba(9,22,43,.7);backdrop-filter:blur(12px);border-right:1px solid var(--border);
  overflow-y:auto;
}
.slide-notes-col::-webkit-scrollbar{width:3px;} .slide-notes-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.notes-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(233,78,119,.12);border:1px solid rgba(233,78,119,.25);border-radius:20px;padding:5px 12px;font-size:.72rem;font-weight:800;color:var(--pink);}
.notes-slide-title{font-size:1.25rem;font-weight:900;color:#fff;line-height:1.4;animation:fadeUp .5s .1s both;}
.notes-divider{height:2px;background:var(--grad);border-radius:2px;width:48px;}
.notes-text{font-size:.9rem;color:var(--text);line-height:1.95;font-weight:500;animation:fadeUp .5s .25s both;}
.notes-text p{margin-bottom:10px;}
.notes-text p:last-child{margin-bottom:0;}
.notes-empty{font-size:.85rem;color:var(--muted);font-style:italic;}
.notes-extras{display:flex;flex-direction:column;gap:8px;margin-top:auto;}
.notes-slide-num{font-size:.72rem;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:5px;}

/* ── BOTTOM BAR ── */
.bottom-bar{
  position:fixed;bottom:0;right:0;left:0;height:var(--bottom);z-index:200;
  background:rgba(5,13,27,.97);border-top:1px solid var(--border);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px;
}
.nav-btns{display:flex;align-items:center;gap:10px;}
.nav-btn{width:44px;height:44px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.2s;}
.nav-btn:hover:not(:disabled){color:var(--text);background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);}
.nav-btn:disabled{opacity:.25;cursor:not-allowed;}
.nav-btn-main{background:var(--grad) !important;border-color:transparent !important;color:#fff !important;width:52px;height:52px;font-size:1.15rem;border-radius:14px;}
.nav-btn-main:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(233,78,119,.4);}
.slide-counter{font-size:.88rem;font-weight:800;color:#fff;white-space:nowrap;}
.slide-counter span{color:var(--muted);}
.dots-wrap{display:flex;align-items:center;gap:5px;flex:1;justify-content:center;overflow:hidden;max-width:380px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:.3s;cursor:pointer;flex-shrink:0;}
.dot.active{background:var(--pink);width:22px;border-radius:4px;}
.dot:hover:not(.active){background:var(--muted);}
.shortcut-hint{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.shortcut-hint kbd{padding:2px 6px;background:var(--card2);border-radius:5px;font-size:.68rem;font-family:'Cairo',sans-serif;}

/* ── FULLSCREEN TRANSITION ── */
.stage.ltr-enter .slide.active{animation:slideEnterNext .55s cubic-bezier(.4,0,.2,1) forwards;}
.stage.rtl-enter .slide.active{animation:slideEnterPrev .55s cubic-bezier(.4,0,.2,1) forwards;}

/* ── MOBILE ── */
@media(max-width:900px){
  .slide-inner{grid-template-columns:1fr;grid-template-rows:1fr auto;}
  .slide-notes-col{max-height:220px;border-right:none;border-top:1px solid var(--border);}
  :root{--sidebar:220px;}
}
@media(max-width:640px){
  .sidebar{display:none;}
  .stage{right:0 !important;}
  .shortcut-hint{display:none;}
}

/* ── EMPTY STATE ── */
#emptyState{display:none;text-align:center;padding:60px 20px;flex-direction:column;align-items:center;justify-content:center;height:100%;}
#emptyState i{font-size:3rem;color:var(--muted);margin-bottom:16px;opacity:.4;}
#emptyState p{color:var(--muted);font-size:1rem;}

/* ── TOAST ── */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);z-index:9999;padding:11px 22px;background:var(--card);border:1px solid var(--border);border-radius:12px;font-size:.85rem;font-weight:700;color:var(--text);opacity:0;transition:.3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── HIDE scrollbar on sidebar ── */
.sidebar-toggle-btn{
  position:fixed;top:50%;right:var(--sidebar);transform:translateY(-50%);z-index:150;
  width:20px;height:48px;background:var(--card);border:1px solid var(--border);border-left:none;
  border-radius:6px 0 0 6px;display:flex;align-items:center;justify-content:center;
  color:var(--muted);cursor:pointer;transition:right .3s,.3s;
}
.sidebar-toggle-btn:hover{color:var(--text);}
.sidebar-toggle-btn.collapsed{right:0;}
</style>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-brand">
    <img src="images/logo.png" alt="">
    <div class="tb-brand-info">
      <div class="lec-title" id="tbLecTitle">جاري التحميل...</div>
      <div class="crs-name" id="tbCrsName"></div>
    </div>
  </div>
  <div class="tb-center">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>
  </div>
  <div class="tb-right">
    <button class="tb-btn" onclick="toggleSidebar()" title="إخفاء/إظهار الشرائح"><i class="fas fa-th-list"></i></button>
    <button class="tb-btn" onclick="toggleFullscreen()" id="fsBtn" title="ملء الشاشة"><i class="fas fa-expand"></i></button>
    <a href="javascript:history.back()" class="tb-back"><i class="fas fa-arrow-right"></i> رجوع</a>
  </div>
</div>

<!-- SIDEBAR (slides panel) -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <span>قائمة الشرائح</span>
    <span class="total" id="sidebarTotal">0</span>
  </div>
  <div class="slides-list" id="slidesList"></div>
</div>

<!-- SIDEBAR TOGGLE BTN -->
<button class="sidebar-toggle-btn" id="sidebarToggleBtn" onclick="toggleSidebar()">
  <i class="fas fa-chevron-left" id="sidebarToggleIcon"></i>
</button>

<!-- MAIN STAGE -->
<div class="stage" id="stage">
  <div class="slide-container" id="slideContainer">
    <div id="emptyState" style="display:flex">
      <i class="fas fa-photo-film"></i>
      <p>لا توجد شرائح في هذه المحاضرة</p>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="nav-btns">
    <button class="nav-btn" id="btnFirst" onclick="goFirst()" title="أول شريحة"><i class="fas fa-step-backward"></i></button>
    <button class="nav-btn nav-btn-main" id="btnPrev" onclick="gotoPrev()"><i class="fas fa-chevron-right"></i></button>
    <button class="nav-btn nav-btn-main" id="btnNext" onclick="gotoNext()"><i class="fas fa-chevron-left"></i></button>
    <button class="nav-btn" id="btnLast" onclick="goLast()" title="آخر شريحة"><i class="fas fa-step-forward"></i></button>
  </div>
  <div class="dots-wrap" id="dotsWrap"></div>
  <div class="slide-counter"><span id="curNum">0</span> / <span id="totNum">0</span></div>
  <div class="shortcut-hint">
    <kbd>←</kbd><kbd>→</kbd> التنقل
    <kbd>F</kbd> ملء الشاشة
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LECTURES_KEY = 'am_lectures';
const COURSES_NAMES = {
  'free':'الكورس المجاني','facebook-ads':'إعلانات فيسبوك',
  'instagram':'إنستجرام','tiktok':'تيك توك','snapchat':'سناب شات',
  'twitter':'تويتر / X','ai-marketing':'الذكاء الاصطناعي',
  'integrated-strategy':'الاستراتيجية المتكاملة','programming':'البرمجة'
};

let slides = [];
let currentIdx = 0;
let sidebarVisible = true;
let isAnimating = false;
let lectureData = null;

// نصوص placeholder وهمية لا تُعتبر src حقيقي
const FAKE_SRCS = new Set(['[صورة مرفوعة]','[محلي]','✓ تم الرفع','✓ محفوظة','✓ جاهزة للحفظ','جاري الضغط...','جاري الرفع...','']);
function cleanSlides(arr){
  return (arr||[]).map(s=>({...s, src: FAKE_SRCS.has((s.src||'').trim()) ? '' : s.src}));
}

// Firebase config
const FB_CONFIG = {
  apiKey:'AIzaSyB9rVI5Fn96Mhm6x6aVcKrf8_epQ_c9H4s',
  authDomain:'akramplatform-2c6be.firebaseapp.com',
  projectId:'akramplatform-2c6be'
};
let _db = null;
try{
  if(!firebase.apps.find(a=>a.name==='viewer')){
    firebase.initializeApp(FB_CONFIG,'viewer');
  }
  _db = firebase.app('viewer').firestore();
}catch(e){ console.warn('Firebase init failed',e); }

// ─── INIT ──────────────────────────────────────────────────────
async function init(){
  const params = new URLSearchParams(location.search);
  const courseKey = params.get('course');
  const lecId = params.get('id');

  if(!courseKey || !lecId){
    showToast('معرّف المحاضرة غير موجود','error'); return;
  }

// Load lecture: try individual doc first, fallback to full lectures doc
  if(_db){
    try{
      const doc = await _db.collection('lectures').doc(lecId).get();
      if(doc.exists){
        const data = doc.data()||{};
        const {courseKey:_ck, savedAt:_sa, ...lec} = data;
        lectureData = lec;
      }
    }catch(e){ console.warn('lectures/{id} load failed',e); }
    // Fallback: read from per-course doc admin_data/lectures_{courseKey}
    if(!lectureData){
      try{
        const cDoc = await _db.collection('admin_data').doc('lectures_'+courseKey).get();
        if(cDoc.exists){
          const courseLecs = cDoc.data().data||[];
          lectureData = courseLecs.find(l=>l.id===lecId)||null;
        }
      }catch(e){ console.warn('lectures_'+courseKey+' fallback failed',e); }
    }
    // Final fallback: old combined admin_data/lectures doc
    if(!lectureData){
      try{
        const fullDoc = await _db.collection('admin_data').doc('lectures').get();
        if(fullDoc.exists){
          const raw = fullDoc.data()||{};
          const allLecs = raw.data||raw;
          const courseLecs = allLecs[courseKey]||[];
          lectureData = courseLecs.find(l=>l.id===lecId)||null;
        }
      }catch(e){ console.warn('admin_data/lectures fallback failed',e); }
    }
  }

  // fallback: localStorage
  if(!lectureData){
    const allLectures = JSON.parse(localStorage.getItem(LECTURES_KEY)||'{}');
    const courseLecs = allLectures[courseKey]||[];
    lectureData = courseLecs.find(l=>l.id===lecId)||null;
  }

  if(!lectureData){
    document.getElementById('tbLecTitle').textContent = 'المحاضرة غير موجودة';
    return;
  }

  // تنظيف الـ src الوهمية
  slides = cleanSlides(lectureData.slides);
  document.getElementById('tbLecTitle').textContent = lectureData.title;
  document.getElementById('tbCrsName').textContent = COURSES_NAMES[courseKey]||courseKey;
  document.title = lectureData.title + ' | Akram Mostafa';

  if(!slides.length){
    document.getElementById('emptyState').style.display='flex';
    return;
  }
  document.getElementById('emptyState').style.display='none';

  renderSidebar();
  renderSlides();
  renderDots();
  updateSidebar(0);
  updateNavBtns();
  updateProgress();
}

// ─── RENDER ────────────────────────────────────────────────────
function renderSidebar(){
  document.getElementById('sidebarTotal').textContent = slides.length;
  document.getElementById('slidesList').innerHTML = slides.map((s,i)=>`
    <div class="slide-thumb-item" id="sthumb-${i}" onclick="gotoSlide(${i},true)">
      <div class="slide-thumb-media">
        ${getThumbMedia(s)}
        <span class="slide-num">${i+1}</span>
      </div>
      <div class="slide-thumb-footer">
        <div class="stt">${s.title||'شريحة '+(i+1)}</div>
        <div class="stl">${s.notes?s.notes.substring(0,50)+'...':getTypeLabel(s.type)}</div>
      </div>
    </div>
  `).join('');
}

function getThumbMedia(s){
  const isRealSrc = s.src && (s.src.startsWith('http')||s.src.startsWith('data:'));
  if(s.type==='image'&&isRealSrc) return `<img src="${s.src}" alt="">`;  
  if(s.type==='video') return `<i class="type-ico fas fa-play-circle"></i>`;
  if(s.type==='pdf')   return `<i class="type-ico fas fa-file-pdf"></i>`;
  return `<i class="type-ico fas fa-image"></i>`;
}
function getTypeLabel(t){
  return t==='video'?'فيديو':t==='pdf'?'ملف PDF':'صورة';
}

function renderSlides(){
  const container = document.getElementById('slideContainer');
  const empty = document.getElementById('emptyState');
  container.innerHTML = '';
  container.appendChild(empty);

  slides.forEach((s,i)=>{
    const el = document.createElement('div');
    el.className = 'slide'+(i===0?' active':'');
    el.id = 'slide-'+i;
    el.dataset.idx = i;
    el.innerHTML = buildSlideHTML(s, i);
    container.appendChild(el);
  });
}

function buildSlideHTML(s, i){
  // التحقق من أن الـ src رابط حقيقي (http أو data:) وليس نص placeholder
  const isRealSrc = s.src && (s.src.startsWith('http')||s.src.startsWith('data:'));

  // background blur from image
  let bgStyle = '';
  if(s.type==='image'&&isRealSrc) bgStyle = `style="background-image:url('${s.src}')"`;

  // media content
  let mediaHTML = '';
  if(s.type==='image'&&isRealSrc){
    mediaHTML = `<div class="slide-media-frame"><img src="${s.src}" alt="${s.title||''}"></div>`;
  } else if(s.type==='video'&&s.src){
    const isYT = s.src.includes('youtube.com')||s.src.includes('youtu.be');
    if(isYT){
      const ytId = extractYoutubeId(s.src);
      mediaHTML = `<div class="slide-media-frame"><div class="video-wrap"><iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen></iframe></div></div>`;
    } else {
      mediaHTML = `<div class="slide-media-frame"><div class="video-wrap"><video controls src="${s.src}"></video></div></div>`;
    }
  } else if(s.type==='pdf'&&s.src){
    mediaHTML = `<div class="slide-media-frame"><div class="pdf-wrap"><iframe src="${s.src}#toolbar=0" title="PDF"></iframe></div></div>`;
  } else {
    mediaHTML = `<div class="no-media-placeholder"><i class="fas fa-image"></i><span>لا توجد وسائط</span></div>`;
  }

  // notes
  const notesHTML = s.notes
    ? s.notes.split('\n').map(line=>line.trim()?`<p>${line}</p>`:'').join('')
    : '<span class="notes-empty">لا يوجد شرح نصي لهذه الشريحة</span>';

  return `
    <div class="slide-inner">
      <div class="slide-media-col">
        <div class="slide-media-bg" ${bgStyle}></div>
        <div class="slide-media-wrap">
          ${mediaHTML}
          ${s.title?`<div class="slide-media-title">${s.title}</div>`:''}
        </div>
      </div>
      <div class="slide-notes-col">
        <div class="notes-badge"><i class="fas fa-book-open"></i> شرح الشريحة</div>
        <div class="notes-slide-title">${s.title||'شريحة '+(i+1)}</div>
        <div class="notes-divider"></div>
        <div class="notes-text">${notesHTML}</div>
        <div class="notes-extras">
          <div class="notes-slide-num"><i class="fas fa-layer-group"></i> الشريحة ${i+1} من ${slides.length}</div>
        </div>
      </div>
    </div>
  `;
}

function renderDots(){
  const wrap = document.getElementById('dotsWrap');
  const max = 12;
  if(slides.length > max){
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = slides.map((_,i)=>`<div class="dot${i===0?' active':''}" id="dot-${i}" onclick="gotoSlide(${i},true)"></div>`).join('');
}

// ─── NAVIGATION ────────────────────────────────────────────────
function gotoSlide(newIdx, isClick=false){
  if(isAnimating || newIdx===currentIdx) return;
  if(newIdx<0||newIdx>=slides.length) return;

  const dir = newIdx>currentIdx?'next':'prev';
  const oldEl = document.getElementById('slide-'+currentIdx);
  const newEl = document.getElementById('slide-'+newIdx);

  if(!oldEl||!newEl) return;
  isAnimating = true;

  // Remove any old animation classes
  oldEl.classList.remove('entering-next','entering-prev','leaving-next','leaving-prev');
  newEl.classList.remove('entering-next','entering-prev','leaving-next','leaving-prev');

  oldEl.classList.add(dir==='next'?'leaving-next':'leaving-prev');
  newEl.classList.add('active', dir==='next'?'entering-next':'entering-prev');

  // re-trigger animations for notes col
  document.querySelectorAll('#slide-'+newIdx+' .notes-slide-title, #slide-'+newIdx+' .notes-text').forEach(el=>{
    el.style.animation='none';
    void el.offsetWidth;
    el.style.animation='';
  });

  currentIdx = newIdx;
  updateSidebar(newIdx);
  updateNavBtns();
  updateProgress();

  setTimeout(()=>{
    oldEl.classList.remove('active','leaving-next','leaving-prev');
    newEl.classList.remove('entering-next','entering-prev');
    isAnimating = false;
  }, 560);
}

function gotoNext(){ gotoSlide(currentIdx+1); }
function gotoPrev(){ gotoSlide(currentIdx-1); }
function goFirst(){ gotoSlide(0); }
function goLast(){ gotoSlide(slides.length-1); }

function updateNavBtns(){
  document.getElementById('btnPrev').disabled = currentIdx===0;
  document.getElementById('btnNext').disabled = currentIdx===slides.length-1;
  document.getElementById('btnFirst').disabled= currentIdx===0;
  document.getElementById('btnLast').disabled = currentIdx===slides.length-1;
  document.getElementById('curNum').textContent = currentIdx+1;
  document.getElementById('totNum').textContent = slides.length;
  // dots
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentIdx));
}

function updateProgress(){
  const pct = slides.length>1?(currentIdx/(slides.length-1)*100):100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = (currentIdx+1)+' / '+slides.length;
}

function updateSidebar(idx){
  document.querySelectorAll('.slide-thumb-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  const active = document.getElementById('sthumb-'+idx);
  if(active) active.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ─── SIDEBAR TOGGLE ────────────────────────────────────────────
function toggleSidebar(){
  sidebarVisible = !sidebarVisible;
  const sb = document.getElementById('sidebar');
  const st = document.getElementById('stage');
  const btn = document.getElementById('sidebarToggleBtn');
  const ico = document.getElementById('sidebarToggleIcon');
  sb.classList.toggle('collapsed',!sidebarVisible);
  st.classList.toggle('full',!sidebarVisible);
  btn.classList.toggle('collapsed',!sidebarVisible);
  ico.className = sidebarVisible?'fas fa-chevron-left':'fas fa-chevron-right';
  // update CSS var
  document.documentElement.style.setProperty('--sidebar', sidebarVisible?'260px':'0px');
}

// ─── FULLSCREEN ────────────────────────────────────────────────
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById('fsBtn').querySelector('i').className='fas fa-compress';
  } else {
    document.exitFullscreen();
    document.getElementById('fsBtn').querySelector('i').className='fas fa-expand';
  }
}

// ─── KEYBOARD ──────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  switch(e.key){
    case 'ArrowLeft': gotoNext(); break;
    case 'ArrowRight': gotoPrev(); break;
    case 'ArrowUp': gotoPrev(); break;
    case 'ArrowDown': gotoNext(); break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'Home': goFirst(); break;
    case 'End': goLast(); break;
  }
});

// ─── TOUCH SWIPE ───────────────────────────────────────────────
let touchStartX=0, touchStartY=0;
document.getElementById('stage').addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
document.getElementById('stage').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
    if(dx>0) gotoPrev(); else gotoNext();
  }
},{passive:true});

// ─── HELPERS ───────────────────────────────────────────────────
function extractYoutubeId(url){
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:'';
}
function showToast(msg, type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+(type||'');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ─── START ─────────────────────────────────────────────────────
init();
</script>
