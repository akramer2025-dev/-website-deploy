<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كورس التسويق بالذكاء الاصطناعي | أكرم مصطفى</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23667eea'/><text y='.9em' font-size='70' x='15'>🤖</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#0a1628;--card:#111e35;--card2:#162038;--border:rgba(255,255,255,.08);
  --purple:#667eea;--purple2:#764ba2;--gold:#f7c948;--green:#25d366;
  --text:#e2e8f0;--muted:rgba(255,255,255,.45);--radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.hero{background:linear-gradient(135deg,#0a1628 0%,#1a1040 50%,#0d1f3c 100%);padding:60px 20px 80px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(102,126,234,.15) 0%,transparent 60%),radial-gradient(ellipse at 70% 30%,rgba(118,75,162,.12) 0%,transparent 50%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(102,126,234,.15);border:1px solid rgba(102,126,234,.3);border-radius:50px;padding:6px 18px;font-size:13px;color:#a78bfa;margin-bottom:20px}
.hero h1{font-size:clamp(26px,5vw,48px);font-weight:900;line-height:1.3;margin-bottom:14px}
.hero h1 span{background:linear-gradient(135deg,#667eea,#f7c948);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:clamp(14px,2vw,18px);color:var(--muted);max-width:600px;margin:0 auto 30px;line-height:1.8}
.hero-stats{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin-top:10px}
.stat{text-align:center}
.stat-num{font-size:28px;font-weight:900;background:linear-gradient(135deg,#667eea,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:12px;color:var(--muted)}
.back-btn{position:absolute;top:20px;right:20px;display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:8px 14px;border-radius:50px;transition:.3s}
.back-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.progress-wrap{background:rgba(255,255,255,.06);height:6px;border-radius:3px;margin:0 20px;position:relative;top:-3px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#667eea,#f7c948);transition:width .5s ease;width:0%}
.section{max-width:1100px;margin:0 auto;padding:50px 20px}
.section-title{text-align:center;font-size:22px;font-weight:900;margin-bottom:10px}
.section-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px}
.lec-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:26px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.lec-card::before{content:'';position:absolute;inset:0;opacity:0;transition:.3s;background:linear-gradient(135deg,rgba(102,126,234,.08),rgba(118,75,162,.06))}
.lec-card:hover{transform:translateY(-4px);border-color:rgba(102,126,234,.4);box-shadow:0 16px 40px rgba(0,0,0,.35)}
.lec-card:hover::before{opacity:1}
.lec-num{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;margin-bottom:14px;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;flex-shrink:0}
.lec-card.done .lec-num{background:linear-gradient(135deg,#16a34a,#15803d)}
.lec-duration{position:absolute;top:18px;left:18px;font-size:11px;color:var(--muted);background:rgba(255,255,255,.06);padding:3px 10px;border-radius:50px}
.lec-title{font-size:16px;font-weight:900;margin-bottom:8px;line-height:1.4}
.lec-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:18px}
.lec-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.tag{background:rgba(102,126,234,.12);border:1px solid rgba(102,126,234,.2);color:#a78bfa;font-size:11px;padding:3px 10px;border-radius:50px}
.lec-footer{display:flex;gap:10px}
.btn-open{flex:1;padding:10px 16px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-open:hover{opacity:.88;transform:translateY(-1px)}
.btn-example{padding:10px 14px;border:1.5px solid rgba(247,201,72,.3);border-radius:10px;background:rgba(247,201,72,.08);color:var(--gold);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.3s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.btn-example:hover{background:rgba(247,201,72,.15);border-color:rgba(247,201,72,.5)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:15px}
.overlay.open{display:flex}
.modal{background:#0f1c35;border:1.5px solid rgba(102,126,234,.25);border-radius:24px;width:100%;max-width:800px;max-height:90vh;overflow-y:auto;animation:popIn .3s ease-out}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal::-webkit-scrollbar{width:6px}
.modal::-webkit-scrollbar-thumb{background:rgba(102,126,234,.4);border-radius:3px}
.modal-header{position:sticky;top:0;z-index:10;background:#0f1c35;border-bottom:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:900;display:flex;align-items:center;gap:10px}
.modal-close{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s}
.modal-close:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4);color:#ef4444}
.modal-body{padding:28px 24px}
.tabs{display:flex;gap:8px;margin-bottom:24px;background:rgba(255,255,255,.04);padding:6px;border-radius:12px}
.tab-btn{flex:1;padding:9px;border:none;border-radius:8px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;background:transparent;color:var(--muted)}
.tab-btn.active{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff}
.tab-panel{display:none}
.tab-panel.active{display:block}
.lesson-block{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.lesson-block h3{font-size:15px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.lesson-block h3 .icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--purple2));display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.lesson-block p{font-size:14px;color:var(--muted);line-height:1.9}
.lesson-block ul{list-style:none;margin-top:10px}
.lesson-block ul li{font-size:14px;color:var(--muted);line-height:1.9;padding-right:20px;position:relative}
.lesson-block ul li::before{content:'←';position:absolute;right:0;color:var(--purple);font-size:12px;line-height:1.9}
.compare-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.compare-table th{background:rgba(102,126,234,.15);padding:10px 14px;font-weight:700;text-align:right;border-bottom:1px solid var(--border)}
.compare-table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--muted)}
.compare-table tr:hover td{background:rgba(255,255,255,.02)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:12px}
.info-item{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.info-item .val{font-size:22px;font-weight:900;background:linear-gradient(135deg,#667eea,#f7c948);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.info-item .lbl{font-size:12px;color:var(--muted);margin-top:4px}
.example-wrap{background:rgba(247,201,72,.05);border:1px solid rgba(247,201,72,.2);border-radius:14px;padding:20px}
.example-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(247,201,72,.15);border:1px solid rgba(247,201,72,.3);color:var(--gold);font-size:12px;font-weight:700;padding:5px 14px;border-radius:50px;margin-bottom:16px}
.example-title{font-size:17px;font-weight:900;margin-bottom:8px}
.example-subtitle{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.7}
.step{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start}
.step-num{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f7c948,#e07c24);color:#000;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-content{flex:1}
.step-content strong{display:block;font-size:14px;font-weight:900;margin-bottom:4px}
.step-content p{font-size:13px;color:var(--muted);line-height:1.7}
.prompt-box{background:#060e1d;border:1px solid rgba(102,126,234,.25);border-radius:12px;padding:16px;margin-top:8px;font-family:'Cairo',sans-serif;font-size:13px;color:#c4b5fd;line-height:1.9;position:relative;white-space:pre-wrap}
.copy-btn{position:absolute;top:10px;left:10px;background:rgba(102,126,234,.2);border:1px solid rgba(102,126,234,.3);color:#a78bfa;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'Cairo',sans-serif;transition:.2s}
.copy-btn:hover{background:rgba(102,126,234,.35)}
.result-box{background:rgba(37,211,102,.06);border:1px solid rgba(37,211,102,.2);border-radius:12px;padding:16px;margin-top:14px}
.result-box .result-title{font-size:13px;font-weight:700;color:#25d366;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.result-box ul{list-style:none;padding:0}
.result-box ul li{font-size:13px;color:var(--muted);line-height:1.9}
.result-box ul li::before{content:'✅ ';color:#25d366}
.tip-box{background:rgba(102,126,234,.07);border:1px solid rgba(102,126,234,.2);border-radius:12px;padding:14px;margin-top:14px;display:flex;gap:10px;align-items:flex-start}
.tip-box .tip-icon{font-size:18px;margin-top:2px;flex-shrink:0}
.tip-box p{font-size:13px;color:var(--muted);line-height:1.8}
.challenge-box{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:16px;margin-top:14px}
.challenge-box .challenge-title{font-size:13px;font-weight:700;color:#fca5a5;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.challenge-box p{font-size:13px;color:var(--muted);line-height:1.9}
.quiz-wrap{margin-top:4px}
.quiz-q{font-size:15px;font-weight:700;margin-bottom:14px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.quiz-opt{padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:.2s;font-size:14px;color:var(--text);background:rgba(255,255,255,.03)}
.quiz-opt:hover{border-color:rgba(102,126,234,.4);background:rgba(102,126,234,.07)}
.quiz-opt.correct{border-color:#25d366!important;background:rgba(37,211,102,.08)!important;color:#25d366!important}
.quiz-opt.wrong{border-color:#ef4444!important;background:rgba(239,68,68,.08)!important;color:#ef4444!important}
.quiz-feedback{display:none;padding:12px 16px;border-radius:10px;font-size:13px;margin-top:4px;line-height:1.7}
.quiz-feedback.show{display:block}
.quiz-feedback.correct-fb{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25d366}
.quiz-feedback.wrong-fb{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.btn-next-q{margin-top:12px;padding:10px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:none}
.btn-next-q.show{display:block}
.btn-done{width:100%;padding:13px;border:none;border-radius:12px;margin-top:20px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-done:hover{opacity:.88}
.btn-done.done-state{background:linear-gradient(135deg,#374151,#1f2937)!important;cursor:not-allowed}
@media(max-width:600px){.grid{grid-template-columns:1fr}.modal-body{padding:16px}.lec-footer{flex-direction:column}}
</style>
</head>

<script>
const LECTURES=[
{id:1,icon:'🤖',title:'مدخل إلى الذكاء الاصطناعي والتسويق',desc:'هتفهم إيه هو الـ AI وليه هو أهم سلاح في إيد المسوّق النهارده',duration:'60 دقيقة',tags:['الأساسيات','AI Overview','فرص العمل'],
content:`<div class="lesson-block"><h3><span class="icon">💡</span> الـ AI بالكلام البسيط</h3><p>الذكاء الاصطناعي مش حاجة صعبة — هو بكل بساطة <strong>تعليم الكمبيوتر يفكر زي الإنسان</strong>. تخيّل عندك موظف بيشتغل 24 ساعة، مش بيتعب، مش بيطلب مرتب كبير، وبيتعلم من كل مرة بتحاوره — ده هو الـ AI.</p></div><div class="lesson-block"><h3><span class="icon">📊</span> أرقام مش هتصدّقها</h3><div class="info-grid"><div class="info-item"><div class="val">73%</div><div class="lbl">من الشركات بتستخدم AI</div></div><div class="info-item"><div class="val">40%</div><div class="lbl">توفير في وقت المحتوى</div></div><div class="info-item"><div class="val">50%</div><div class="lbl">تحسين نتايج الإعلانات</div></div><div class="info-item"><div class="val">36B$</div><div class="lbl">حجم سوق AI Marketing</div></div></div></div><div class="lesson-block"><h3><span class="icon">⚔️</span> مسوّق عادي مقابل مسوّق بـ AI</h3><table class="compare-table"><tr><th>المهمة</th><th>بدون AI</th><th>مع AI</th></tr><tr><td>كتابة بوست</td><td>30-60 دقيقة</td><td>3-5 دقايق</td></tr><tr><td>تصميم صورة</td><td>مصمم + أيام</td><td>ثوانٍ</td></tr><tr><td>10 إعلانات</td><td>يوم كامل</td><td>ساعة</td></tr><tr><td>الرد على عملاء</td><td>موظف بدوام</td><td>Bot 24/7</td></tr></table></div><div class="lesson-block"><h3><span class="icon">🗺️</span> خريطة الأدوات</h3><ul><li><strong>المحتوى النصي:</strong> ChatGPT, Claude, Gemini</li><li><strong>الصور:</strong> Midjourney, Leonardo AI, Canva AI</li><li><strong>الفيديو:</strong> Runway ML, HeyGen, CapCut AI</li><li><strong>الأتمتة:</strong> ManyChat, Zapier, Make.com</li></ul></div>`,
example:{title:'جرّب ChatGPT على طول دلوقتي 🔥',subtitle:'افتح ChatGPT في تاب جديد وجرّب الـ Prompt الجاي — الهدف إنك تشوف بنفسك الفرق اللي الـ AI بيعمله',steps:[{title:'افتح ChatGPT',desc:'روح على chat.openai.com — ولو مش عندك حساب سجّل مجاناً في دقيقتين'},{title:'انسخ الـ Prompt الجاي',desc:'حدده واضغط زر النسخ — بعدين هوريه لـ ChatGPT وانتظر النتيجة'},{title:'قارن النتيجة',desc:'قارن سرعة وجودة الإجابة بو تكتبها بنفسك من الصفر — هتشوف الفرق بنفسك'}],
prompt:`أنت خبير تسويق رقمي متخصص في السوق المصري.
عندي متجر ملابس صغير في القاهرة وعاوز أنشر على السوشيال ميديا.

إديني 5 أفكار بوست جاهزة ومختلفة للأسبوع ده.
لكل فكرة:
- العنوان
- الكاب شن الجاهز للنشر (عامية مصرية)
- الهاشتاجز المناسبة`,
result:['5 بوستات كاملة جاهزة في أقل من 30 ثانية!','قارن ده بكتابتهم بنفسك — كانت هاخد منك كام ساعة؟','الفرق ده هو سبب تعلّمك الكورس ده 💪'],
tip:'مش لازم الـ Prompt يكون طويل — لكن لازم يكون <strong>محدد</strong>. كلما كانت التفاصيل أوضح، كلما كانت الإجابة أحسن.',
challenge:'بعد ما تجرّب، غيّر المتجر لأي مجال تاني وكرّر — شوف ازاي الأسلوب بيتغير تلقائياً!'},
quiz:{q:'إيه الفرق الرئيسي بين المسوّق العادي والمسوّق اللي بيستخدم AI؟',opts:['المسوّق بالـ AI مش بيفتكر خالص والـ AI بيشتغل بدله كلياً','المسوّق بالـ AI بيستخدمه كأداة توفّر وقته وتضاعف إنتاجيته','المسوّق بالـ AI لازم يتعلم برمجة وذكاء اصطناعي أول','مفيش فرق — بس بيكتب أسرع شوية'],correct:1,feedback:'صح جداً! الـ AI مش بديل عنك — هو أداة بتضاعف قدرتك × 10. إنت اللي بتفكر وبتوجّه، والـ AI بينفّذ بسرعة.'}

{id:2,icon:'🛠️',title:'أدوات الذكاء الاصطناعي الأساسية',desc:'هتتعلم تستخدم ChatGPT + Canva AI + Leonardo بشكل احترافي وتكتب Prompts قوية',duration:'75 دقيقة',tags:['ChatGPT','Canva AI','Prompts','Leonardo AI'],

{id:5,icon:'💰',title:'الإعلانات المدفوعة والذكاء الاصطناعي',desc:'هتعرف تشغّل إعلانات ناجحة وتستخدم Advantage+ وتقرأ الأرقام بذكاء',duration:'90 دقيقة',tags:['Facebook Ads','Advantage+','A/B Testing','ROAS'],
content:`<div class="lesson-block"><h3><span class="icon">🧠</span> كيف تفكر خوارزمية Meta</h3><p>فيسبوك سؤاله الوحيد: <strong>"الإعلان ده هيجيب قيمة لمستخدميني؟"</strong></p><ul><li><strong>Relevance Score:</strong> مدى صلة الإعلان بالجمهور</li><li><strong>CTR:</strong> نسبة النقر — كلما أعلى كلما أرخص</li><li><strong>Engagement:</strong> تعليقات، مشاركات، وقت المشاهدة</li><li><strong>Conversion:</strong> هل بيتحوّل لعميل؟</li></ul></div><div class="lesson-block"><h3><span class="icon">📊</span> قراءة الأرقام</h3><table class="compare-table"><tr><th>المقياس</th><th>المعدل الكويس</th><th>معناه</th></tr><tr><td>CTR</td><td>أكتر من 1%</td><td>الإعلان جذّاب</td></tr><tr><td>ROAS</td><td>3x فأكتر</td><td>ربح حقيقي</td></tr><tr><td>Frequency</td><td>2-4 مرات</td><td>تكرار المشاهدة</td></tr></table></div><div class="lesson-block"><h3><span class="icon">🔬</span> A/B Testing بالترتيب الصح</h3><ul><li><strong>1️⃣ أول:</strong> الصورة / الفيديو (الأكبر تأثيراً)</li><li><strong>2️⃣ تاني:</strong> الـ Headline</li><li><strong>3️⃣ تالت:</strong> الـ Primary Text</li><li><strong>4️⃣ رابع:</strong> الجمهور</li></ul></div>`,
example:{title:'اكتب 3 إعلانات مختلفة لنفس المنتج 🎯',subtitle:'هنكتب 3 نسخ بزوايا مختلفة — وهنشوف إيه الأقوى في جمهورك',steps:[{title:'اختار منتج أو خدمة',desc:'أي حاجة: كورس، منتج، خدمة — المهم واضح إيه هو وإيه الفايدة'},{title:'ابعت الـ Prompt',desc:'استخدم الـ Prompt الجاي وهيكتبلك 3 نسخ مختلفة في ثوانٍ'},{title:'قارن النسخ',desc:'اقرأ كل نسخة وحدد: إيه الأكتر تأثيراً في جمهورك؟'},{title:'شغّل النسختين الأقوى',desc:'مش لازم تشغّل 3 — شغّل 2 فقط: الأقوى + التانية في الترتيب'},{title:'حلّل بعد 3 أيام',desc:'النسخة اللي CTR بتاعها أعلى هي الرابحة — اعتمدها'}],
prompt:`أنت خبير كوبي رايتنج ومتخصص في إعلانات فيسبوك للسوق المصري.

function getDone(){try{return JSON.parse(localStorage.getItem('ai_course_done')||'[]')}catch(e){return[]}}
function setDone(arr){try{localStorage.setItem('ai_course_done',JSON.stringify(arr))}catch(e){}}

function renderCards(){
  const done=getDone();
  document.getElementById('lecturesGrid').innerHTML=LECTURES.map(l=>{
    const isDone=done.includes(l.id);
    return`<div class="lec-card${isDone?' done':''}" data-id="${l.id}">
      <span class="lec-duration"><i class="fas fa-clock" style="margin-left:4px;opacity:.6"></i>${l.duration}</span>
      <div class="lec-num">${isDone?'✓':l.id}</div>
      <div class="lec-title">${l.icon} ${l.title}</div>
      <div class="lec-desc">${l.desc}</div>
      <div class="lec-tags">${l.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="lec-footer">
        <button class="btn-open" onclick="openModal(${l.id},'content')"><i class="fas fa-book-open"></i> افتح المحاضرة</button>
        <button class="btn-example" onclick="openModal(${l.id},'example')"><i class="fas fa-flask"></i> مثال عملي</button>
      </div>
    </div>`;
  }).join('');
  const pct=Math.round(getDone().length/LECTURES.length*100);
  document.getElementById('progressFill').style.width=pct+'%';
}

let quizAnswered=false;

function openModal(id,tab){
  quizAnswered=false;
  const l=LECTURES.find(x=>x.id===id);
  const isDone=getDone().includes(id);
  document.getElementById('modalTitle').innerHTML=`<span style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:15px">${l.icon}</span> محاضرة ${l.id} — ${l.title}`;
  document.getElementById('modalBody').innerHTML=`
    <div class="tabs">
      <button class="tab-btn" id="tab-content" onclick="switchTab('content')">📚 الشرح</button>
      <button class="tab-btn" id="tab-example" onclick="switchTab('example')">🔥 المثال العملي</button>
      <button class="tab-btn" id="tab-quiz" onclick="switchTab('quiz')">🧠 تحدِّ نفسك</button>
    </div>
    <div class="tab-panel" id="panel-content">${l.content}</div>
    <div class="tab-panel" id="panel-example">${buildEx(l.example)}</div>
    <div class="tab-panel" id="panel-quiz">${buildQuiz(l.quiz,id)}</div>
    <button class="btn-done${isDone?' done-state':''}" id="btnDone" onclick="markDone(${id})" ${isDone?'disabled':''}>
      <i class="fas fa-${isDone?'check-double':'check'}"></i> ${isDone?'أحسنت! خلّصت المحاضرة دي ✓':'خلّصت المحاضرة — علّم عليها ✓'}
    </button>`;
  switchTab(tab||'content');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function buildEx(ex){
  return`<div class="example-wrap">
    <div class="example-badge"><i class="fas fa-fire"></i> مثال عملي تطبيقي</div>
    <div class="example-title">${ex.title}</div>
    <div class="example-subtitle">${ex.subtitle}</div>
    ${ex.steps.map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-content"><strong>${s.title}</strong><p>${s.desc}</p></div></div>`).join('')}
    <div style="margin-top:20px">
      <div style="font-size:13px;font-weight:700;color:#a78bfa;margin-bottom:8px"><i class="fas fa-copy" style="margin-left:6px"></i> الـ Prompt الجاهز — انسخه وجرّبه دلوقتي:</div>
      <div class="prompt-box" id="pb_${Math.random().toString(36).slice(2)}">${ex.prompt}<button class="copy-btn" onclick="copyP(this)">نسخ</button></div>
    </div>
    <div class="result-box"><div class="result-title"><i class="fas fa-check-circle"></i> إيه اللي هتلاقيه</div><ul>${ex.result.map(r=>`<li>${r}</li>`).join('')}</ul></div>
    <div class="tip-box"><div class="tip-icon">💡</div><p><strong>نصيحة المدرب:</strong> ${ex.tip}</p></div>
    <div class="challenge-box"><div class="challenge-title"><i class="fas fa-bolt"></i> تحدِّ إضافي!</div><p>${ex.challenge}</p></div>
  </div>`;
}

function buildQuiz(q,id){
  return`<div class="quiz-wrap">
    <div style="background:rgba(247,201,72,.08);border:1px solid rgba(247,201,72,.2);border-radius:12px;padding:14px;margin-bottom:20px;font-size:13px;color:var(--gold)"><i class="fas fa-brain" style="margin-left:6px"></i> اختبر فهمك — ده أهم سؤال في المحاضرة</div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-opts">${q.opts.map((o,i)=>`<div class="quiz-opt" onclick="answer(this,${i},${q.correct},'${esc(q.feedback)}')">${o}</div>`).join('')}</div>
    <div class="quiz-feedback" id="qfb"></div>
    <button class="btn-next-q" id="btnNq" onclick="closeModal()"><i class="fas fa-arrow-left"></i> ممتاز! ارجع للمحاضرات</button>
  </div>`;
}

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}

function switchTab(t){
  ['content','example','quiz'].forEach(id=>{
    document.getElementById('tab-'+id)?.classList.toggle('active',id===t);
    document.getElementById('panel-'+id)?.classList.toggle('active',id===t);
  });
}

function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow=''}
function closeIfOverlay(e){if(e.target===document.getElementById('overlay'))closeModal()}

function markDone(id){
  const done=getDone();
  if(!done.includes(id)){done.push(id);setDone(done)}
  const btn=document.getElementById('btnDone');
  btn.innerHTML='<i class="fas fa-check-double"></i> أحسنت! خلّصت المحاضرة دي ✓';
  btn.classList.add('done-state');btn.disabled=true;
  renderCards();
}

function answer(el,chosen,correct,feedback){
  if(quizAnswered)return;quizAnswered=true;
  document.querySelectorAll('.quiz-opt').forEach((o,i)=>{
    if(i===correct)o.classList.add('correct');
    else if(i===chosen&&chosen!==correct)o.classList.add('wrong');
    o.style.cursor='default';
  });
  const fb=document.getElementById('qfb');
  fb.textContent=(chosen===correct?'✅ صح! ':'❌ مش كده. الإجابة الصح: ')+feedback;
  fb.className='quiz-feedback show '+(chosen===correct?'correct-fb':'wrong-fb');
  document.getElementById('btnNq').classList.add('show');
}

function copyP(btn){
  const text=btn.closest('.prompt-box').innerText.replace('نسخ','').trim();
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='تم ✓';btn.style.background='rgba(37,211,102,.25)';btn.style.color='#25d366';
    setTimeout(()=>{btn.textContent='نسخ';btn.style.background='';btn.style.color=''},2000);
  }).catch(()=>{btn.textContent='انسخ يدوياً'});
}

renderCards();
</script>
</body>
</html>
