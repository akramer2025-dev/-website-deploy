<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=lecture-viewer-v2.html?id=lec_april_1">
    <title>كورس التسويق الاحترافي - أبريل 2026</title>
    <link rel="icon" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a1f44, #0d1b3e);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #e94e77, #f7931e);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(233, 78, 119, 0.2);
            border-top-color: #e94e77;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(45deg, #e94e77, #f7931e);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            margin-top: 20px;
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 كورس التسويق الاحترافي</h1>
        <p>جاري تحويلك إلى المحاضرة الأولى...</p>
        <div class="spinner"></div>
        <p style="font-size: 16px; color: rgba(255,255,255,0.7); margin-top: 30px;">
            إذا لم يتم التحويل تلقائياً، اضغط على الزر أدناه:
        </p>
        <a href="lecture-viewer-v2.html?id=lec_april_1" class="btn">اذهب إلى المحاضرة</a>
    </div>
</body>
</html>
