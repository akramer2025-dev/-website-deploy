<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاضراتي | Akram Mostafa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050d1b; --bg2:#09162b; --card:#0d1e38; --card2:#112446;
  --border:rgba(255,255,255,0.07); --pink:#e94e77; --orange:#f7931e;
  --grad:linear-gradient(135deg,#e94e77,#f7931e); --green:#22c55e;
  --blue:#3b82f6; --text:#e2eaf6; --muted:#6b82a8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:'Cairo',sans-serif;}

/* ─── HEADER ─── */
.header{background:rgba(9,22,43,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand img{width:38px;height:38px;}
.brand-title{font-size:1rem;font-weight:900;color:#fff;}
.brand-sub{font-size:.72rem;color:var(--muted);}
.header-right{display:flex;align-items:center;gap:12px;}
.user-badge{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--card2);border:1px solid var(--border);border-radius:12px;}
.user-badge .uname{font-size:.82rem;font-weight:800;color:#fff;}
.user-badge .urole{font-size:.7rem;color:var(--muted);}
.logout-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(233,78,119,.08);border:1px solid rgba(233,78,119,.2);color:var(--pink);border-radius:10px;font-size:.8rem;font-weight:700;transition:.2s;}
.logout-btn:hover{background:rgba(233,78,119,.15);}

/* ─── MAIN ─── */
.main{max-width:1100px;margin:0 auto;padding:36px 24px;}

/* hero */
.hero{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:36px;display:flex;align-items:center;gap:24px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;left:40px;width:220px;height:220px;background:radial-gradient(circle,rgba(233,78,119,.12) 0%,transparent 70%);pointer-events:none;}
.hero-avatar{width:72px;height:72px;background:var(--grad);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#fff;flex-shrink:0;}
.hero-text h1{font-size:1.4rem;font-weight:900;color:#fff;margin-bottom:5px;}
.hero-text p{font-size:.88rem;color:var(--muted);}
.hero-stats{display:flex;gap:20px;margin-right:auto;}
.hstat{text-align:center;padding:12px 20px;background:var(--bg2);border-radius:14px;}
.hstat .hn{font-size:1.5rem;font-weight:900;color:#fff;}
.hstat .hl{font-size:.72rem;color:var(--muted);margin-top:2px;}

/* section */
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.section-head-icon{width:40px;height:40px;background:var(--grad);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;}
.section-head h2{font-size:1.1rem;font-weight:900;color:#fff;}
.section-head .cnt{background:var(--card2);border-radius:20px;padding:3px 10px;font-size:.78rem;color:var(--muted);font-weight:700;margin-right:auto;}

/* course cards grid */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.crs-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:.25s;position:relative;}
.crs-card:hover{transform:translateY(-3px);border-color:rgba(233,78,119,.25);box-shadow:0 12px 36px rgba(0,0,0,.4);}
.crs-banner{height:120px;background:linear-gradient(135deg,var(--bg2),var(--card2));position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.crs-banner-ico{font-size:2.8rem;opacity:.25;}
.crs-banner-badge{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:20px;font-size:.68rem;font-weight:800;}
.badge-free{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.badge-paid{background:rgba(247,147,30,.12);color:var(--orange);border:1px solid rgba(247,147,30,.25);}
.crs-body{padding:18px;}
.crs-name{font-size:1rem;font-weight:900;color:#fff;margin-bottom:8px;}
.crs-meta{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.crs-meta .lec-cnt{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:5px;}
.crs-meta .lec-cnt i{color:var(--pink);}
.crs-lectures-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;background:var(--grad);border:none;border-radius:12px;color:#fff;font-size:.88rem;font-weight:800;width:100%;transition:.2s;}
.crs-lectures-btn:hover{transform:scale(1.02);box-shadow:0 6px 18px rgba(233,78,119,.35);}
.crs-lectures-btn:disabled{background:var(--card2);color:var(--muted);cursor:default;transform:none;box-shadow:none;}

/* lecture list mini */
.crs-lectures-list{margin-top:14px;display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;}
.crs-lectures-list::-webkit-scrollbar{width:3px;} .crs-lectures-list::-webkit-scrollbar-thumb{background:var(--border);}
.lec-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:10px;cursor:pointer;transition:.2s;text-decoration:none;}
.lec-item:hover{background:rgba(233,78,119,.08);border-color:rgba(233,78,119,.2);}
.lec-item .lnum{width:28px;height:28px;min-width:28px;background:var(--card2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:var(--muted);}
.lec-item.first .lnum{background:var(--grad);color:#fff;}
.lec-item .ltitle{font-size:.82rem;font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lec-item .lslides{font-size:.7rem;color:var(--muted);}
.lec-item .play-ico{color:var(--muted);font-size:.78rem;}
.no-lecs{font-size:.82rem;color:var(--muted);padding:14px;text-align:center;}

/* ─── LIVE SESSIONS ─── */
.live-section{margin-bottom:36px;}
.live-sessions-row{display:flex;flex-direction:column;gap:12px;}
.live-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;
  display:flex;align-items:center;gap:16px;transition:.25s;position:relative;overflow:hidden;}
.live-card::before{content:'';position:absolute;top:0;right:0;bottom:0;width:4px;background:var(--grad);}
.live-card.is-live::before{background:linear-gradient(to bottom,#22c55e,#16a34a);}
.live-card.is-live{border-color:rgba(34,197,94,.25);}
.live-card:hover{transform:translateX(-3px);}
.live-card-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.live-card-dot.live{background:#22c55e;box-shadow:0 0 10px rgba(34,197,94,.6);animation:lpulse 1.5s infinite;}
.live-card-dot.scheduled{background:#f59e0b;}
@keyframes lpulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5);}50%{box-shadow:0 0 0 8px rgba(34,197,94,0);}}
.live-card-info{flex:1;}
.live-card-title{font-size:.95rem;font-weight:800;color:#fff;margin-bottom:4px;}
.live-card-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.lmeta{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:4px;}
.lmeta i{color:var(--pink);font-size:.72rem;}
.live-status-pill{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:800;}
.live-status-pill.live{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3);}
.live-status-pill.scheduled{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25);}
.btn-join-live{display:flex;align-items:center;gap:7px;padding:10px 20px;background:var(--grad);border:none;
  border-radius:11px;color:#fff;font-size:.85rem;font-weight:800;white-space:nowrap;transition:.25s;}
.btn-join-live:hover{transform:scale(1.04);box-shadow:0 8px 24px rgba(233,78,119,.4);}
.btn-join-soon{display:flex;align-items:center;gap:7px;padding:10px 18px;background:var(--card2);
  border:1px solid var(--border);border-radius:11px;color:var(--muted);font-size:.82rem;font-weight:700;white-space:nowrap;}
.no-live{font-size:.82rem;color:var(--muted);padding:16px;text-align:center;background:var(--card2);border-radius:12px;}

/* empty state */
.empty-state{text-align:center;padding:80px 20px;}
.empty-state i{font-size:3rem;color:var(--muted);opacity:.3;margin-bottom:16px;}
.empty-state p{color:var(--muted);font-size:.95rem;}

/* ─── RESPONSIVE ─── */
@media(max-width:700px){
  .hero{flex-wrap:wrap;}
  .hero-stats{flex-wrap:wrap;gap:12px;}
  .courses-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <img src="images/logo.png" alt="">
      <div>
        <div class="brand-title">Akram Mostafa</div>
        <div class="brand-sub">بوابة الطالب</div>
      </div>
    </div>
    <div class="header-right">
      <div class="user-badge">
        <i class="fas fa-user-circle" style="color:var(--pink);font-size:1.2rem;"></i>
        <div>
          <div class="uname" id="userName">---</div>
          <div class="urole">طالب</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> خروج
      </button>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-avatar"><i class="fas fa-graduation-cap"></i></div>
    <div class="hero-text">
      <h1>أهلاً بك، <span id="heroName">---</span> 👋</h1>
      <p>هنا تجد محاضرات جميع كورساتك المسجل فيها</p>
    </div>
    <div class="hero-stats">
      <div class="hstat"><div class="hn" id="totalCourses">0</div><div class="hl">كورس</div></div>
      <div class="hstat"><div class="hn" id="totalLecs">0</div><div class="hl">محاضرة</div></div>
      <div class="hstat"><div class="hn" id="totalSlides">0</div><div class="hl">شريحة</div></div>
    </div>
  </div>

  <!-- LIVE SESSIONS -->
  <div class="live-section" id="liveSection" style="display:none">
    <div class="section-head">
      <div class="section-head-icon" style="background:linear-gradient(135deg,#22c55e,#16a34a)"><i class="fas fa-broadcast-tower"></i></div>
      <h2>جلسات مباشرة</h2>
      <div class="cnt" id="liveCnt">0</div>
    </div>
    <div class="live-sessions-row" id="liveSessionsRow"></div>
  </div>

  <!-- COURSES -->
  <div class="section-head">
    <div class="section-head-icon"><i class="fas fa-book-open"></i></div>
    <h2>كورساتي</h2>
    <div class="cnt" id="crsCount">0 كورس</div>
  </div>

  <div class="courses-grid" id="coursesGrid">
    <div class="empty-state" style="grid-column:1/-1">
      <i class="fas fa-spinner fa-spin"></i>
      <p>جاري التحميل...</p>
    </div>
  </div>

</main>

<script>
const USERS_KEY = 'am_users';
const LECTURES_KEY = 'am_lectures';
const LIVE_KEY = 'am_live_sessions';
const REC_LECS_KEY = 'am_recorded_lectures';
const COURSES_META = {
  'free':      { name:'الكورس المجاني',   icon:'fa-gift',           color:'#22c55e', paid:false },
  'facebook-ads':{ name:'إعلانات فيسبوك', icon:'fa-facebook',       color:'#1877f2', paid:true  },
  'instagram': { name:'إنستجرام',         icon:'fa-instagram',      color:'#e1306c', paid:true  },
  'tiktok':    { name:'تيك توك',          icon:'fa-music',          color:'#69c9d0', paid:true  },
  'snapchat':  { name:'سناب شات',         icon:'fa-snapchat',       color:'#fffc00', paid:true  },
  'twitter':   { name:'تويتر / X',        icon:'fa-x-twitter',      color:'#fff',    paid:true  },
  'ai-marketing':{ name:'الذكاء الاصطناعي',icon:'fa-robot',         color:'#a78bfa', paid:true  },
  'integrated-strategy':{ name:'الاستراتيجية المتكاملة',icon:'fa-layer-group',color:'var(--orange)',paid:true },
  'programming':{ name:'البرمجة',          icon:'fa-code',           color:'#38bdf8', paid:true  },
};

let currentUser = null;

// ─── INIT ───────────────────────────────────────────────────────
function init(){
  // get user id from sessionStorage
  const uid = sessionStorage.getItem('akram_student_id');
  if(!uid){ logout(); return; }

  const users = JSON.parse(localStorage.getItem(USERS_KEY)||'[]');
  currentUser = users.find(u=>String(u.id)===String(uid));
  if(!currentUser){ logout(); return; }

  document.getElementById('userName').textContent  = currentUser.username || currentUser.name || 'طالب';
  document.getElementById('heroName').textContent  = (currentUser.name||currentUser.username||'طالب').split(' ')[0];

  const allLectures = JSON.parse(localStorage.getItem(LECTURES_KEY)||'{}');
  const recLectures = JSON.parse(localStorage.getItem(REC_LECS_KEY)||'[]');

  /* backward compat: courses might be comma-string from old accounts */
  let enrolledCourses = currentUser.courses || [];
  if(typeof enrolledCourses === 'string') enrolledCourses = enrolledCourses.split(',').map(s=>s.trim()).filter(Boolean);

  let totalLecs = 0, totalSlides = 0;
  enrolledCourses.forEach(ck=>{
    const lecs = allLectures[ck]||[];
    totalLecs += lecs.length;
    lecs.forEach(l=>{ totalSlides += (l.slides||[]).length; });
  });

  document.getElementById('totalCourses').textContent = enrolledCourses.length;
  document.getElementById('totalLecs').textContent   = totalLecs;
  document.getElementById('totalSlides').textContent = totalSlides;
  document.getElementById('crsCount').textContent    = enrolledCourses.length+' كورس';

  renderCourses(enrolledCourses, allLectures, recLectures);
  renderLiveSessions(enrolledCourses);
}

// ─── LIVE SESSIONS ───────────────────────────────────────────────
function renderLiveSessions(enrolledCourses){
  const all = JSON.parse(localStorage.getItem(LIVE_KEY)||'[]');
  // show only sessions for enrolled courses that are live or scheduled
  const relevant = all.filter(s=>enrolledCourses.includes(s.courseKey) && s.status !== 'ended');
  const section = document.getElementById('liveSection');
  const row = document.getElementById('liveSessionsRow');
  const cnt = document.getElementById('liveCnt');
  if(!relevant.length){ section.style.display='none'; return; }
  section.style.display='block';
  cnt.textContent = relevant.length + ' ' + (relevant.length===1?'جلسة':'جلسات');
  row.innerHTML = relevant.map(s=>{
    const isLive = s.status==='live';
    const courseMeta = COURSES_META[s.courseKey]||{name:s.courseKey,icon:'fa-book',color:'var(--pink)'};
    const dt = s.scheduledAt ? new Date(s.scheduledAt).toLocaleString('ar-EG',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
    return `<div class="live-card ${isLive?'is-live':''}">
      <div class="live-card-dot ${s.status}"></div>
      <div class="live-card-info">
        <div class="live-card-title">${s.title}</div>
        <div class="live-card-meta">
          <span class="lmeta"><i class="fas fa-book"></i>${courseMeta.name}</span>
          <span class="lmeta"><i class="fas fa-clock"></i>${dt}</span>
          <span class="live-status-pill ${s.status}">${isLive?'مباشر 🔴':'قريباً ⏰'}</span>
        </div>
      </div>
      ${isLive
        ?`<a href="live-session.html?id=${s.id}" class="btn-join-live"><i class="fas fa-sign-in-alt"></i> ادخل دلوقتي</a>`
        :`<button class="btn-join-soon" disabled><i class="fas fa-clock"></i> لسه ما بدأتش</button>`
      }
    </div>`;
  }).join('');
}

// ─── RENDER COURSES ───────────────────────────────────────────
function renderCourses(courses, allLectures, recLectures){
  const grid = document.getElementById('coursesGrid');
  if(!courses.length){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-box-open"></i><p>لم يتم تسجيلك في أي كورس بعد</p></div>`;
    return;
  }

  grid.innerHTML = courses.map(ck=>{
    const meta = COURSES_META[ck] || { name:ck, icon:'fa-book', color:'var(--pink)', paid:true };
    const lecs = allLectures[ck] || [];
    const hasLecs = lecs.length > 0;
    const courseRecLecs = (recLectures||[]).filter(r=>r.courseKey===ck);

    const lecsList = hasLecs ? `
      <div class="crs-lectures-list">
        ${lecs.map((l,i)=>`
          <a href="lecture-viewer.html?course=${ck}&id=${l.id}" class="lec-item${i===0?' first':''}">
            <span class="lnum">${i+1}</span>
            <span class="ltitle">${l.title||'محاضرة '+(i+1)}</span>
            <span class="lslides"><i class="fas fa-images"></i>${(l.slides||[]).length} شريحة</span>
            <i class="fas fa-play-circle play-ico"></i>
          </a>
        `).join('')}
      </div>
    ` : `<div class="no-lecs"><i class="fas fa-clock" style="margin-left:4px;"></i>لم تُضف محاضرات بعد</div>`;

    const recLecsList = courseRecLecs.length ? `
      <div style="margin-top:14px;">
        <div style="font-size:.72rem;font-weight:900;color:var(--muted);letter-spacing:.06em;margin-bottom:8px;"><i class="fas fa-video" style="margin-left:5px;color:#a78bfa"></i>محاضرات مسجلة (${courseRecLecs.length})</div>
        ${courseRecLecs.map(r=>`
          <a href="${r.videoUrl}" target="_blank" class="lec-item" style="text-decoration:none;gap:8px;">
            <i class="fas fa-play-circle" style="color:#a78bfa;font-size:1rem;"></i>
            <span class="ltitle">${r.title}</span>
            ${r.duration?`<span class="lslides"><i class="fas fa-clock"></i>${r.duration}</span>`:''}
            <i class="fas fa-external-link-alt" style="font-size:.7rem;color:var(--muted);margin-right:auto"></i>
          </a>`).join('')}
      </div>
    ` : '';

    return `
      <div class="crs-card">
        <div class="crs-banner" style="background:linear-gradient(135deg,rgba(13,30,56,.8),rgba(17,36,70,.9));">
          <i class="fas ${meta.icon} crs-banner-ico" style="color:${meta.color};"></i>
          <span class="crs-banner-badge ${meta.paid?'badge-paid':'badge-free'}">${meta.paid?'مدفوع':'مجاني'}</span>
        </div>
        <div class="crs-body">
          <div class="crs-name">${meta.name}</div>
          <div class="crs-meta">
            <span class="lec-cnt"><i class="fas fa-play-circle"></i> ${lecs.length} محاضرة</span>
            <span class="lec-cnt"><i class="fas fa-images"></i> ${lecs.reduce((a,l)=>a+(l.slides||[]).length,0)} شريحة</span>
            ${courseRecLecs.length?`<span class="lec-cnt" style="color:#a78bfa"><i class="fas fa-video"></i> ${courseRecLecs.length} مسجلة</span>`:''}
          </div>
          ${lecsList}
          ${recLecsList}
        </div>
      </div>
    `;
  }).join('');
}

// ─── LOGOUT ─────────────────────────────────────────────────────
function logout(){
  sessionStorage.removeItem('akram_student_id');
  window.location.href = 'login.html';
}

init();
</script>
</body>
</html>
