<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلاب - Akram Mostafa</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #00E5FF;
            --secondary-color: #00B8D4;
            --dark-bg: #0a0e17;
            --darker-bg: #0d1117;
            --text-light: #ffffff;
            --text-muted: #b8c5d6;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-light);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,229,255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .stat-icon.primary {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
        }

        .stat-icon.success {
            background: var(--success);
        }

        .stat-icon.warning {
            background: var(--warning);
        }

        .stat-content h3 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .stat-content p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Main Content */
        .main-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .section-header h2 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form */
        .add-student-form {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: none;
        }

        .add-student-form.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
        }

        .lectures-checkboxes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkbox-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Students Table */
        .students-table {
            width: 100%;
            border-collapse: collapse;
        }

        .students-table thead {
            background: rgba(255, 255, 255, 0.05);
        }

        .students-table th {
            padding: 15px;
            text-align: right;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .students-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .students-table tbody tr {
            transition: all 0.3s ease;
        }

        .students-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin: 2px;
        }

        .badge-success {
            background: rgba(40, 167, 69, 0.2);
            color: var(--success);
        }

        .action-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 14px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .alert.show {
            display: flex;
            animation: slideDown 0.3s ease;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-danger {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .students-table {
                font-size: 14px;
            }

            .students-table th,
            .students-table td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <!-- Particles.js Background -->
    <div id="particles-js"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <i class="fas fa-users-cog"></i>
                إدارة الطلاب
            </h1>
            <div class="header-actions">
                <span id="adminName" style="color: var(--text-muted);">
                    <i class="fas fa-user-shield"></i>
                    <span id="adminNameText">المدير</span>
                </span>
                <a href="/admin" class="btn btn-secondary">
                    <i class="fas fa-home"></i>
                    لوحة التحكم
                </a>
                <button class="btn btn-secondary" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    تسجيل الخروج
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon primary">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-content">
                    <h3 id="totalStudents">0</h3>
                    <p>إجمالي الطلاب</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon success">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="stat-content">
                    <h3 id="activeLectures">2</h3>
                    <p>المحاضرات المتاحة</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon warning">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-content">
                    <h3 id="recentStudents">0</h3>
                    <p>مسجلين اليوم</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div id="alertContainer"></div>

            <div class="section-header">
                <h2>
                    <i class="fas fa-list"></i>
                    قائمة الطلاب
                </h2>
                <button class="btn btn-primary" onclick="toggleAddForm()">
                    <i class="fas fa-user-plus"></i>
                    إضافة طالب جديد
                </button>
            </div>

            <!-- Add Student Form -->
            <div class="add-student-form" id="addStudentForm">
                <h3 style="margin-bottom: 20px;">
                    <i class="fas fa-user-plus"></i>
                    <span id="formTitle">إضافة طالب جديد</span>
                </h3>
                
                <form id="studentForm" onsubmit="saveStudent(event)">
                    <input type="hidden" id="studentId">
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="studentUsername">
                                <i class="fas fa-user"></i>
                                اسم المستخدم *
                            </label>
                            <input type="text" id="studentUsername" required 
                                   placeholder="username" pattern="[a-zA-Z0-9_]+" 
                                   title="يجب أن يحتوي على حروف إنجليزية وأرقام فقط">
                        </div>

                        <div class="form-group">
                            <label for="studentPassword">
                                <i class="fas fa-lock"></i>
                                كلمة المرور *
                            </label>
                            <input type="text" id="studentPassword" required 
                                   placeholder="كلمة المرور (6 أحرف على الأقل)" minlength="6">
                        </div>

                        <div class="form-group">
                            <label for="studentName">
                                <i class="fas fa-id-card"></i>
                                الاسم الكامل *
                            </label>
                            <input type="text" id="studentName" required 
                                   placeholder="الاسم الكامل بالعربي">
                        </div>

                        <div class="form-group">
                            <label for="studentEmail">
                                <i class="fas fa-envelope"></i>
                                البريد الإلكتروني *
                            </label>
                            <input type="email" id="studentEmail" required 
                                   placeholder="email@example.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>
                            <i class="fas fa-book-open"></i>
                            المحاضرات المتاحة للطالب *
                        </label>
                        <div class="lectures-checkboxes" id="lecturesCheckboxes">
                            <label class="checkbox-item">
                                <input type="checkbox" name="lectures" value="lec_april_1" checked>
                                <span>الحصة 1: الهوية البصرية - أبريل</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="lectures" value="lec_april_2" checked>
                                <span>الحصة 2: استراتيجية المحتوى - أبريل</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="lectures" value="lec_april_5" checked>
                                <span>الحصة 5: حساب جوجل وخرائط جوجل - أبريل</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="cancelForm()">
                            <i class="fas fa-times"></i>
                            إلغاء
                        </button>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i>
                            <span id="submitBtnText">حفظ الطالب</span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Students Table -->
            <div id="studentsTableContainer">
                <table class="students-table">
                    <thead>
                        <tr>
                            <th>اسم المستخدم</th>
                            <th>الاسم</th>
                            <th>البريد الإلكتروني</th>
                            <th>المحاضرات المتاحة</th>
                            <th>تاريخ التسجيل</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                        <!-- Students will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Initialize Particles.js
        particlesJS('particles-js', {
            particles: {
                number: { value: 60, density: { enable: true, value_area: 800 } },
                color: { value: '#00E5FF' },
                shape: { type: 'circle' },
                opacity: { value: 0.3, random: true },
                size: { value: 3, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: '#00E5FF',
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1.5,
                    direction: 'none',
                    random: true,
                    out_mode: 'out'
                }
            }
        });

        // Check authentication
        function checkAuth() {
            const session = JSON.parse(localStorage.getItem('auth_session') || 'null');
            if (!session || !session.isAdmin) {
                alert('يجب تسجيل الدخول كمدير للوصول لهذه الصفحة');
                window.location.href = '/lecture-viewer-v2.html';
                return false;
            }
            
            // Update admin name
            document.getElementById('adminNameText').textContent = session.name;
            return true;
        }

        // Logout
        function logout() {
            localStorage.removeItem('auth_session');
            window.location.href = '/lecture-viewer-v2.html';
        }

        // Get all students from localStorage
        function getAllStudents() {
            const students = localStorage.getItem('custom_students');
            return students ? JSON.parse(students) : {};
        }

        // Save students to localStorage
        function saveAllStudents(students) {
            localStorage.setItem('custom_students', JSON.stringify(students));
        }

        // Load students table
        function loadStudents() {
            const students = getAllStudents();
            const tbody = document.getElementById('studentsTableBody');
            
            // Update stats
            const totalCount = Object.keys(students).length;
            document.getElementById('totalStudents').textContent = totalCount;
            
            // Count recent students (registered today)
            const today = new Date().toDateString();
            const recentCount = Object.values(students).filter(s => {
                return s.registeredAt && new Date(s.registeredAt).toDateString() === today;
            }).length;
            document.getElementById('recentStudents').textContent = recentCount;
            
            if (totalCount === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <i class="fas fa-users-slash"></i>
                                <h3>لا يوجد طلاب مسجلين</h3>
                                <p>ابدأ بإضافة طالب جديد من الزر أعلاه</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = Object.entries(students).map(([username, student]) => {
                const lectures = student.allowedLectures || [];
                const lectureNames = {
                    'lec_april_1': 'حصة 1 - أبريل',
                    'lec_april_2': 'حصة 2 - أبريل',
                    'lec_april_5': 'حصة 5 - أبريل'
                };
                
                const lecturesBadges = lectures.map(l => 
                    `<span class="badge badge-success">${lectureNames[l] || l}</span>`
                ).join('');

                const registeredDate = student.registeredAt 
                    ? new Date(student.registeredAt).toLocaleDateString('ar-EG')
                    : 'غير محدد';

                return `
                    <tr>
                        <td><strong>${username}</strong></td>
                        <td>${student.name}</td>
                        <td>${student.email}</td>
                        <td>${lecturesBadges || '<span class="badge">لا توجد</span>'}</td>
                        <td>${registeredDate}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn btn-primary btn-small" onclick="editStudent('${username}')">
                                    <i class="fas fa-edit"></i>
                                    تعديل
                                </button>
                                <button class="btn btn-danger btn-small" onclick="deleteStudent('${username}')">
                                    <i class="fas fa-trash"></i>
                                    حذف
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Toggle add form
        function toggleAddForm() {
            const form = document.getElementById('addStudentForm');
            form.classList.toggle('active');
            if (form.classList.contains('active')) {
                document.getElementById('studentUsername').focus();
            }
        }

        // Cancel form
        function cancelForm() {
            document.getElementById('studentForm').reset();
            document.getElementById('studentId').value = '';
            document.getElementById('formTitle').textContent = 'إضافة طالب جديد';
            document.getElementById('submitBtnText').textContent = 'حفظ الطالب';
            document.getElementById('addStudentForm').classList.remove('active');
        }

        // Show alert
        function showAlert(message, type = 'success') {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} show`;
            alert.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
                <span>${message}</span>
            `;
            container.innerHTML = '';
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.classList.remove('show');
                setTimeout(() => alert.remove(), 300);
            }, 4000);
        }

        // Save student
        function saveStudent(event) {
            event.preventDefault();
            
            const username = document.getElementById('studentUsername').value.trim();
            const password = document.getElementById('studentPassword').value;
            const name = document.getElementById('studentName').value.trim();
            const email = document.getElementById('studentEmail').value.trim();
            const oldUsername = document.getElementById('studentId').value;
            
            // Get selected lectures
            const lectureCheckboxes = document.querySelectorAll('input[name="lectures"]:checked');
            const allowedLectures = Array.from(lectureCheckboxes).map(cb => cb.value);
            
            if (allowedLectures.length === 0) {
                showAlert('يجب اختيار محاضرة واحدة على الأقل', 'danger');
                return;
            }
            
            const students = getAllStudents();
            
            // Check if username exists (when adding new)
            if (!oldUsername && students[username]) {
                showAlert('اسم المستخدم موجود بالفعل! اختر اسماً آخر', 'danger');
                return;
            }
            
            // If editing and username changed, delete old entry
            if (oldUsername && oldUsername !== username) {
                delete students[oldUsername];
            }
            
            // Save student
            students[username] = {
                password: password,
                name: name,
                email: email,
                allowedLectures: allowedLectures,
                registeredAt: oldUsername ? students[username]?.registeredAt : new Date().toISOString()
            };
            
            saveAllStudents(students);
            loadStudents();
            cancelForm();
            
            const action = oldUsername ? 'تم تحديث' : 'تم إضافة';
            showAlert(`${action} الطالب "${name}" بنجاح! ✅`);
        }

        // Edit student
        function editStudent(username) {
            const students = getAllStudents();
            const student = students[username];
            
            if (!student) return;
            
            // Fill form
            document.getElementById('studentId').value = username;
            document.getElementById('studentUsername').value = username;
            document.getElementById('studentPassword').value = student.password;
            document.getElementById('studentName').value = student.name;
            document.getElementById('studentEmail').value = student.email;
            
            // Check lectures
            document.querySelectorAll('input[name="lectures"]').forEach(cb => {
                cb.checked = student.allowedLectures.includes(cb.value);
            });
            
            // Update form title
            document.getElementById('formTitle').textContent = 'تعديل بيانات الطالب';
            document.getElementById('submitBtnText').textContent = 'حفظ التعديلات';
            
            // Show form
            document.getElementById('addStudentForm').classList.add('active');
            document.getElementById('studentUsername').focus();
        }

        // Delete student
        function deleteStudent(username) {
            const students = getAllStudents();
            const student = students[username];
            
            if (!student) return;
            
            if (!confirm(`هل أنت متأكد من حذف الطالب "${student.name}"؟\n\nهذا الإجراء لا يمكن التراجع عنه!`)) {
                return;
            }
            
            delete students[username];
            saveAllStudents(students);
            loadStudents();
            
            showAlert(`تم حذف الطالب "${student.name}" بنجاح`, 'danger');
        }

        // Initialize
        if (checkAuth()) {
            loadStudents();
        }
    </script>
</body>
</html>
